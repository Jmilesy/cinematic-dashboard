      - backdrop-filter: blur(10px)
      - transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1)
      - overflow: hidden
      - position: relative

dynamic_background:
  styles:
    card:
      - background: |
          [[[
            const baseGradient = states['sensor.header_time_period'].attributes.gradient;
            const weatherOverlay = states['sensor.header_weather_summary'].attributes.weather_overlay;
            const sunTint = states['sensor.header_time_period'].attributes.sun_tint;
            const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%)";
            
            const layers = [shimmer];
            if (sunTint !== 'none') layers.push(sunTint);
            if (weatherOverlay !== 'none') layers.push(weatherOverlay);
            layers.push(baseGradient);
            
            return layers.join(", ");
          ]]]
      - animation: backgroundPulse 20s ease-in-out infinite alternate

###############################################################
# NAV BUTTON - WITH DYNAMIC BACKGROUND
###############################################################
nav_button:
  show_icon: true
  show_name: true
  
  styles:
    card:
      - border-radius: 16px
      - padding: 12px 8px
      - min-height: 70px
      - display: flex
      - flex-direction: column
      - align-items: center
      - justify-content: center
      - gap: 6px
      - border: 1px solid rgba(255,255,255,0.15)
      - transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1)
      - box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1)
      - backdrop-filter: blur(10px)
      - background: |
          [[[
            const baseGradient = states['sensor.header_time_period'].attributes.gradient;
            const weatherOverlay = states['sensor.header_weather_summary'].attributes.weather_overlay;
            const sunTint = states['sensor.header_time_period'].attributes.sun_tint;
            const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%)";
            
            const layers = [shimmer];
            if (sunTint !== 'none') layers.push(sunTint);
            if (weatherOverlay !== 'none') layers.push(weatherOverlay);
            layers.push(baseGradient);
            
            return layers.join(", ");
          ]]]
    
    icon:
      - width: 28px
      - height: 28px
      - color: |
          [[[
            return variables.icon_color || 'white';
          ]]]
      - filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5))
    
    name:
      - font-size: 0.85rem
      - font-weight: 500
      - color: white
      - text-shadow: 0 1px 3px rgba(0,0,0,0.5)
      - margin-top: 2px

###############################################################
# ROOM CARD - WITH LIGHT-UP ICON & DYNAMIC BACKGROUND
###############################################################
room_card:
  show_icon: true
  show_name: true
  show_label: true
  
  styles:
    card:
      - padding: 14px
      - border-radius: 18px
      - border: 1px solid rgba(255,255,255,0.15)
      - box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1)
      - backdrop-filter: blur(10px)
      - transition: all 0.35s ease
      - height: auto
      - background: |
          [[[
            const baseGradient = states['sensor.header_time_period'].attributes.gradient;
            const weatherOverlay = states['sensor.header_weather_summary'].attributes.weather_overlay;
            const sunTint = states['sensor.header_time_period'].attributes.sun_tint;
            const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%)";
            
            const layers = [shimmer];
            if (sunTint !== 'none') layers.push(sunTint);
            if (weatherOverlay !== 'none') layers.push(weatherOverlay);
            layers.push(baseGradient);
            
            return layers.join(", ");
          ]]]
    
    grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 48px 1fr
      - grid-template-rows: auto auto
      - column-gap: 12px
      - row-gap: 4px
    
    img_cell:
      - justify-self: center
      - align-self: center
    
    icon:
      - width: 36px
      - height: 36px
      - color: |
          [[[
            return entity.state === 'on' ? '#ffd700' : 'rgba(255,255,255,0.5)';
          ]]]
      - filter: |
          [[[
            return entity.state === 'on' 
              ? 'drop-shadow(0 0 8px #ffd700) drop-shadow(0 2px 8px rgba(0,0,0,0.5))' 
              : 'drop-shadow(0 2px 8px rgba(0,0,0,0.5))';
          ]]]
      - transition: all 0.3s ease
    
    name:
      - font-size: 1.05rem
      - font-weight: 600
      - color: white
      - text-shadow: 0 1px 4px rgba(0,0,0,0.5)
      - justify-self: start
      - align-self: end
    
    label:
      - font-size: 0.9rem
      - opacity: 0.85
      - color: rgba(255,255,255,0.9)
      - text-shadow: 0 1px 3px rgba(0,0,0,0.4)
      - justify-self: start
      - align-self: start

###############################################################
# SWITCH CARD - WITH DYNAMIC BACKGROUND
###############################################################
switch_card:
  show_icon: true
  show_name: true
  
  tap_action:
    action: toggle
  
  styles:
    card:
      - display: flex
      - flex-direction: column
      - align-items: center
      - justify-content: center
      - padding: 16px 12px
      - min-height: 90px
      - gap: 8px
      - border-radius: 16px
      - border: |
          [[[
            const glowColor = variables.glow_color || '#ffd700';
            return entity.state === 'on' ? `2px solid ${glowColor}60` : '1px solid rgba(255,255,255,0.15)';
          ]]]
      - box-shadow: |
          [[[
            const glowColor = variables.glow_color || '#ffd700';
            return entity.state === 'on' 
              ? `0 0 24px ${glowColor}40, 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1)` 
              : '0 8px 32px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1)';
          ]]]
      - backdrop-filter: blur(10px)
      - background: |
          [[[
            const glowColor = variables.glow_color || '#ffd700';
            const baseGradient = states['sensor.header_time_period'].attributes.gradient;
            const weatherOverlay = states['sensor.header_weather_summary'].attributes.weather_overlay;
            const sunTint = states['sensor.header_time_period'].attributes.sun_tint;
            const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%)";
            
            const layers = [shimmer];
            if (sunTint !== 'none') layers.push(sunTint);
            if (weatherOverlay !== 'none') layers.push(weatherOverlay);
            
            if (entity.state === 'on') {
              layers.push(`linear-gradient(135deg, ${glowColor}25, ${glowColor}08)`);
            }
            
            layers.push(baseGradient);
            
            return layers.join(", ");
          ]]]
      - transition: all 0.35s ease
    
    icon:
      - width: 32px
      - height: 32px
      - color: |
          [[[
            const glowColor = variables.glow_color || '#ffd700';
            return entity.state === 'on' ? glowColor : 'rgba(255,255,255,0.6)';
          ]]]
      - filter: |
          [[[
            const glowColor = variables.glow_color || '#ffd700';
            return entity.state === 'on' 
              ? `drop-shadow(0 0 8px ${glowColor}80)` 
              : 'drop-shadow(0 2px 4px rgba(0,0,0,0.5))';
          ]]]
      - transition: all 0.3s ease
    
    name:
      - font-size: 0.9rem
      - font-weight: 500
      - color: white
      - text-shadow: 0 1px 3px rgba(0,0,0,0.5)
      - text-align: center