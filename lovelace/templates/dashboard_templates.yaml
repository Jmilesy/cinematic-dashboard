###############################################################
# DYNAMIC CINEMATIC BACKGROUND (Time + Weather Combined)
###############################################################
dynamic_background:
  styles:
    card:
      - background: |
          [[[
            // Time-based gradient helper
            function getTimeGradient(hour) {
              if (hour < 7) return "linear-gradient(135deg, #0d0d12, #1a1a24)";
              if (hour < 12) return "linear-gradient(135deg, #1c2733, #2f3e4d)";
              if (hour < 18) return "linear-gradient(135deg, #2a3f52, #3d5a6d)";
              return "linear-gradient(135deg, #3b2a4d, #6a4f7d)";
            }

            // Weather tint helper
            function getWeatherTint(weather) {
              if (weather.includes("thunder")) return "rgba(40,40,60,0.35)";
              if (weather.includes("rain")) return "rgba(60,90,140,0.25)";
              if (weather.includes("cloud")) return "rgba(80,80,80,0.20)";
              if (weather.includes("fog") || weather.includes("mist")) return "rgba(120,120,120,0.18)";
              if (weather.includes("snow")) return "rgba(180,200,255,0.25)";
              if (weather.includes("wind")) return "rgba(70,120,120,0.18)";
              return null;
            }

            // Sun tint for golden hours
            function getSunTint(hour) {
              if (hour >= 6 && hour < 8) return "rgba(255,180,120,0.15)";
              if (hour >= 17 && hour < 19) return "rgba(255,140,100,0.15)";
              return null;
            }

            const hour = new Date().getHours();
            const weather = states['weather.pirateweather']?.state || "clear";
            
            const base = getTimeGradient(hour);
            const weatherTint = getWeatherTint(weather);
            const sunTint = getSunTint(hour);
            const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06))";

            // Build gradient layers
            const layers = [shimmer];
            if (sunTint) layers.push(`linear-gradient(${sunTint}, ${sunTint})`);
            if (weatherTint) layers.push(`linear-gradient(${weatherTint}, ${weatherTint})`);
            layers.push(base);

            return layers.join(", ");
          ]]]

###############################################################
# ATMOSPHERIC EFFECTS (Fog, Rain, Wind)
###############################################################
atmospheric_effects:
  card_mod:
    style: |
      [[[
        const weather = states['weather.pirateweather']?.state || "";

        const isFog = weather.includes("fog") || weather.includes("mist");
        const isRain = weather.includes("rain");
        const isWind = weather.includes("wind");
        const isThunder = weather.includes("thunder");

        const fogOpacity = isFog ? 0.35 : 0;
        const rainOpacity = isRain ? 0.25 : 0;
        const windOpacity = isWind ? 0.18 : 0;

        return `
          ha-card {
            position: relative;
            overflow: hidden;
            animation: headerGlow 8s ease-in-out infinite alternate;
          }

          ha-card > * {
            position: relative;
            z-index: 1;
          }

          /* Fog + Wind Layer */
          ha-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: ${Math.max(fogOpacity, windOpacity)};
            background:
              radial-gradient(circle at 10% 20%, rgba(255,255,255,0.06) 0, transparent 55%),
              radial-gradient(circle at 80% 60%, rgba(255,255,255,0.04) 0, transparent 55%);
            filter: blur(6px);
            animation: fogDrift 55s linear infinite;
          }

          /* Rain Streaks */
          ha-card::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: ${rainOpacity};
            background-image:
              linear-gradient(180deg, rgba(255,255,255,0.14) 0, transparent 60%),
              linear-gradient(180deg, rgba(255,255,255,0.09) 0, transparent 55%);
            background-size: 2px 40px, 1px 30px;
            background-repeat: repeat;
            animation: rainFall 35s linear infinite;
          }

          @keyframes fogDrift {
            0%   { transform: translateX(-10%); }
            50%  { transform: translateX(5%); }
            100% { transform: translateX(15%); }
          }

          @keyframes rainFall {
            0%   { background-position: 0 -40px, 0 -30px; }
            100% { background-position: 0 40px, 0 30px; }
          }

          @keyframes headerGlow {
            0%   { box-shadow: 0 0 18px rgba(0,0,0,0.25); }
            100% { box-shadow: 0 0 26px rgba(0,0,0,0.45); }
          }

          ${isThunder && Math.random() < 0.05 ? `
            @keyframes lightning {
              0%, 100% { opacity: 0; }
              50% { opacity: 0.8; }
            }
            ha-card {
              animation: lightning 0.1s ease-in-out 3;
            }
          ` : ''}
        `;
      ]]]

###############################################################
# CINEMATIC CARD BASE
###############################################################
cinematic_card:
  styles:
    card:
      - border-radius: 20px
      - padding: 16px
      - box-shadow: 0 0 18px rgba(0,0,0,0.35)
      - transition: all 0.4s ease
      - overflow: hidden
      - position: relative

###############################################################
# PERSON CARD COMPLETE (All-in-one template)
###############################################################
person_card:
  variables:
    accent: "#ffffff"
    battery_level: "sensor.unknown"
    battery_state: "sensor.unknown"

  template:
    - cinematic_card
    - dynamic_background

  styles:
    card:
      - display: grid
      - grid-template-columns: 36px 1fr
      - grid-template-rows: auto auto 12px
      - grid-template-areas: |
          "picture name"
          "picture location"
          "battery battery"
      - column-gap: 8px
      - row-gap: 2px
      - padding: 10px
      - border: 2px solid [[[ return `${variables.accent}40` ]]]
      - box-shadow: |
          [[[
            return `0 0 18px ${variables.accent}35`;
          ]]]

    name:
      - grid-area: name
      - font-size: 0.82rem
      - font-weight: 600
      - color: white
      - justify-self: start
      - align-self: center
      - white-space: nowrap
      - overflow: hidden
      - text-overflow: ellipsis
      - max-width: 100%
      - display: block

    label:
      - grid-area: location
      - font-size: 0.72rem
      - opacity: 0.85
      - color: white
      - justify-self: start
      - align-self: center
      - white-space: nowrap
      - overflow: hidden
      - text-overflow: ellipsis
      - max-width: 100%
      - display: block

    custom_fields:
      picture:
        - grid-area: picture
        - width: 36px
        - height: 36px
        - border-radius: 50%
        - overflow: hidden
        - display: flex
        - align-items: center
        - justify-content: center
        - background: rgba(255,255,255,0.1)

      battery:
        - grid-area: battery
        - width: 100%
        - height: 12px
        - display: flex
        - align-items: center

  custom_fields:
    picture: |
      [[[
        const pic = entity.attributes.entity_picture;
        
        if (!pic) {
          const name = entity.attributes.friendly_name || 'Unknown';
          const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2);
          return `
            <div style="width:100%;height:100%;border-radius:50%;
                background:linear-gradient(135deg, ${variables.accent}60, ${variables.accent}40);
                display:flex;align-items:center;justify-content:center;
                font-size:1.1rem;font-weight:700;color:white;">
              ${initials}
            </div>
          `;
        }
        
        const url = window.location.origin + pic;
        return `
          <img src="${url}" 
               style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
               onerror="this.parentElement.innerHTML='<div style=\\'font-size:2rem\\'>👤</div>'">
        `;
      ]]]

    battery: |
      [[[
        const batteryEntity = variables.battery_level || 'sensor.unknown';
        const stateEntity = variables.battery_state || 'sensor.unknown';
        
        if (!states[batteryEntity]) {
          return `<div style="font-size:0.7rem;opacity:0.6;">⚠ No battery data</div>`;
        }
        
        const lvl = Math.max(0, Math.min(100, parseInt(states[batteryEntity]?.state) || 0));
        const chg = states[stateEntity]?.state || 'unknown';
        const isHome = entity.state === 'home';
        const color = variables.accent || "#ffffff";
        
        // Determine color based on level
        let barColor = color;
        if (lvl < 15) barColor = "#ff4444";
        else if (lvl < 30) barColor = "#ffaa00";
        
        const isCharging = chg === 'charging';
        const showPulse = isHome && (isCharging || lvl < 20);
        
        return `
          <div style="width:100%;height:12px;border-radius:6px;
                      background:rgba(255,255,255,0.12);position:relative;
                      overflow:hidden;">
            <div style="
              position:absolute;
              height:100%;
              width:${lvl}%;
              background:linear-gradient(90deg, ${barColor}AA, ${barColor}DD);
              border-radius:6px;
              transition:width 0.4s ease;
              display:flex;
              align-items:center;
              justify-content:center;
              font-size:8px;
              font-weight:700;
              color:white;
              text-shadow:0 0 3px rgba(0,0,0,0.8);
              ${isCharging && isHome ? `
                animation: batteryFlow 1.8s linear infinite;
                background-size: 200% 100%;
                box-shadow: 0 0 8px ${barColor}AA;
              ` : ''}
              ${lvl < 15 ? 'animation: shake 0.4s ease-in-out infinite;' : ''}
            ">
              ${lvl}%${isCharging ? ' ⚡' : ''}
            </div>
          </div>
          
          <style>
            @keyframes batteryFlow {
              0% { background-position: 200% 0; }
              100% { background-position: -200% 0; }
            }
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              25% { transform: translateX(-2px); }
              50% { transform: translateX(2px); }
              75% { transform: translateX(-2px); }
            }
          </style>
        `;
      ]]]

###############################################################
# CINEMATIC HEADER
###############################################################
cinematic_header:
  template:
    - dynamic_background

  styles:
    card:
      - display: grid
      - grid-template-columns: 1fr 1.4fr 1fr
      - grid-template-rows: auto auto
      - grid-template-areas: |
          "time greeting weather"
          "presence presence presence"
      - padding: 20px 16px
      - border-radius: 20px
      - align-items: center
      - row-gap: 6px
      - column-gap: 8px
      - position: relative
      - color: white
      - box-shadow: 0 0 18px rgba(0,0,0,0.25)
      - animation: fadeIn 1s ease-out

    custom_fields:
      time:
        - grid-area: time
        - justify-self: start
        - text-align: left
      greeting:
        - grid-area: greeting
        - justify-self: center
        - text-align: center
      weather:
        - grid-area: weather
        - justify-self: end
        - text-align: right
      presence:
        - grid-area: presence
        - justify-self: center
        - text-align: center

  custom_fields:
    time: |
      [[[
        const d = new Date();
        const h = d.getHours().toString().padStart(2,'0');
        const m = d.getMinutes().toString().padStart(2,'0');
        return `<div style="font-size:2.1rem;font-weight:600;color:white;">${h}:${m}</div>`;
      ]]]

    greeting: |
      [[[
        const hour = new Date().getHours();
        let emoji, text;
        
        if (hour >= 18) {
          emoji = "🌙";
          text = "Good Evening, Jon!";
        } else if (hour >= 12) {
          emoji = "☀️";
          text = "Good Afternoon, Jon!";
        } else if (hour >= 5) {
          emoji = "🌅";
          text = "Good Morning, Jon!";
        } else {
          emoji = "🌌";
          text = "Hello, Jon!";
        }
        
        return `<div style="font-size:1.1rem;font-weight:500;color:white;">${emoji} ${text}</div>`;
      ]]]

    weather: |
      [[[
        const temp = states['sensor.pirateweather_apparent_temperature']?.state ?? '--';
        const cond = states['weather.pirateweather']?.state ?? 'unknown';
        const icon = states['sensor.pirateweather_icon']?.state ?? 'mdi:weather-cloudy';

        return `
          <div style="display:flex;flex-direction:column;align-items:flex-end;">
            <ha-icon icon="${icon}" style="width:26px;height:26px;color:white;"></ha-icon>
            <div style="font-size:1.2rem;margin-top:4px;color:white;">${temp}°C</div>
            <div style="font-size:0.85rem;opacity:0.8;text-transform:capitalize;color:white;">
              ${cond.replace('-', ' ')}
            </div>
          </div>
        `;
      ]]]

    presence: |
      [[[
        const people = [
          { name: "Jon", entity: "person.jon", room: "sensor.jon_room" },
          { name: "Natalie", entity: "person.natalie", room: "sensor.natalie_room" },
          { name: "Jacob", entity: "person.jacob", room: "sensor.jacob_room" },
          { name: "Joseph", entity: "person.joseph", room: "sensor.joseph_room" }
        ];

        const present = [];

        people.forEach(p => {
          const state = states[p.entity]?.state;
          if (!state || state === "not_home") return;

          const roomState = states[p.room]?.state;

          if (roomState && roomState !== "unknown" && roomState !== "unavailable") {
            present.push(`${p.name} in ${roomState.replace('_', ' ')}`);
          } else {
            present.push(`${p.name} home`);
          }
        });

        let text = present.length === 0 ? "Nobody home" : present.join(" • ");
        const fontSize = text.length > 32 ? "0.95rem" : "1.05rem";

        return `<div style="font-size:${fontSize};font-weight:500;margin-top:4px;color:white;">${text}</div>`;
      ]]]

