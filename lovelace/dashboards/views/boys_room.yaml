title: Boys Room
path: boys
type: sidebar
theme: Google Dark Theme
cards:

  # ── BACK ──────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          margin-bottom: 8px;
        }

  # ── STATS ─────────────────────────────────────────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.boysroom_temperature
        name: TEMP
        template: room_stat
        variables:
          accent: "255,150,0"

      # humidity sensor unavailable until ESP32 deployed — shows —
      - type: custom:button-card
        entity: sensor.boysroom_humidity
        name: HUMIDITY
        template: room_stat
        variables:
          accent: "100,200,255"

      # brightness sensor unavailable until ESP32 deployed — shows —
      - type: custom:button-card
        entity: sensor.boysroom_brightness
        name: LIGHT
        template: room_stat
        variables:
          accent: "255,255,80"

  # ── LIGHTING ──────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "💡 LIGHTING"
      accent: "255,200,0"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-light-card
        entity: light.boys_light
        name: Main Light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        show_color_temp_control: true
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-light-card
        entity: light.joseph
        name: Joseph's Light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        show_color_temp_control: true
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-light-card
        entity: light.boys_led_light
        name: LED Strip
        icon: mdi:led-strip-variant
        use_light_color: true
        show_brightness_control: true
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── MEDIA ─────────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🎵 MEDIA"
      accent: "138,43,226"

  - type: custom:mushroom-media-player-card
    entity: media_player.boy_s_new_dot
    use_media_info: true
    show_volume_level: true
    volume_controls:
      - volume_mute
      - volume_set
    media_controls:
      - on_off
      - play_pause
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.1);
          box-shadow: 0 4px 20px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
        }

  # ── ROOM CONTROLS ─────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "⚙️ CONTROLS"
      accent: "100,200,255"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: switch.boys_aircon
        name: A/C
        icon: mdi:air-conditioner
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: binary_sensor.boys_room_door
        name: Door
        icon: mdi:door
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── ENERGY ────────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "⚡ A/C ENERGY"
      accent: "255,100,100"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: sensor
        entity: sensor.boys_aircon_energy_power
        graph: line
        hours_to_show: 24
        detail: 1
        name: Power Draw
        unit: W
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: sensor
        entity: sensor.boys_aircon_energy_today
        graph: none
        name: Energy Today
        unit: kWh
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }
