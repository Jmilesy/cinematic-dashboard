title: Landing
path: landing
type: sidebar
theme: Google Dark Theme
cards:

  # ── BACK ──────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          margin-bottom: 8px;
        }

  # ── STATS ─────────────────────────────────────────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.landing_temperature
        name: TEMP
        template: room_stat
        variables:
          accent: "255,150,0"

      - type: custom:button-card
        entity: sensor.landing_humidity
        name: HUMIDITY
        template: room_stat
        variables:
          accent: "100,200,255"

      - type: custom:button-card
        entity: sensor.landing_brightness
        name: LIGHT
        template: room_stat
        variables:
          accent: "255,255,80"

  # ── LIGHTING ──────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "💡 LIGHTING"
      accent: "255,200,0"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-light-card
        entity: light.hall_light
        name: Hall Light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        show_color_temp_control: true
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-light-card
        entity: switch.makeup_light
        name: Makeup Light
        icon: mdi:face-woman-shimmer
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }
