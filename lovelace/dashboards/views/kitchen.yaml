title: Kitchen
path: kitchen
type: sidebar
theme: Google Dark Theme
cards:

  # ── BACK ──────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          margin-bottom: 8px;
        }

  # ── STATS ─────────────────────────────────────────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.kitchen_temperature
        name: TEMP
        template: room_stat
        variables:
          accent: "255,150,0"

      - type: custom:button-card
        entity: sensor.kitchen_humidity
        name: HUMIDITY
        template: room_stat
        variables:
          accent: "100,200,255"

      - type: custom:button-card
        entity: sensor.kitchen_brightness
        name: LIGHT
        template: room_stat
        variables:
          accent: "255,255,80"

  # ── LIGHTING ──────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "💡 LIGHTING"
      accent: "255,200,0"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-light-card
        entity: light.kitchen_light
        name: Main Light
        icon: mdi:ceiling-light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        show_color_temp_control: true
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-light-card
        entity: switch.counter_light
        name: Counter LED
        icon: mdi:led-strip-variant
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── MEDIA ─────────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🎵 MEDIA"
      accent: "138,43,226"

  - type: custom:mushroom-media-player-card
    entity: media_player.kitchen_dot
    use_media_artwork: true
    use_media_info: true
    show_volume_level: true
    volume_controls:
      - volume_set
      - volume_mute
    media_controls:
      - on_off
      - previous
      - play_pause_stop
      - next
    collapsible_controls: true
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.1);
          box-shadow: 0 4px 20px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
        }

  # ── MONITORING ────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🔍 MONITORING"
      accent: "100,200,255"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: binary_sensor.kitchen_pir_sensor
        name: Motion
        icon: mdi:motion-sensor
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: binary_sensor.kitchen_mw_sensor
        name: Microwave
        icon: mdi:microwave
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: sensor.wash_cycle_status
        name: Washing Machine
        icon: mdi:washing-machine
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── WASTE COLLECTION ──────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "♻️ WASTE COLLECTION"
      accent: "80,200,120"

  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.waste_next_combined') }}"
    icon: mdi:trash-can-outline
    icon_color: green
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,0.1);
          box-shadow: 0 4px 20px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          padding: 4px;
          animation: {{
            'pulse 2.5s ease-in-out infinite' if states('sensor.waste_next_relative') == 'tomorrow'
            else 'none'
          }};
        }
        @keyframes pulse {
          0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
          50% { box-shadow: 0 0 20px rgba(0,200,80,0.3), 0 4px 20px rgba(0,0,0,0.4); }
        }

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Refuse
        secondary: "{{ states('sensor.waste_next_refuse') }}"
        icon: mdi:trash-can
        icon_color: blue
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-template-card
        primary: Food
        secondary: "{{ states('sensor.waste_next_food') }}"
        icon: mdi:food
        icon_color: green
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-template-card
        primary: Recycling
        secondary: "{{ states('sensor.waste_next_recycling') }}"
        icon: mdi:recycle
        icon_color: teal
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-template-card
        primary: Paper/Card
        secondary: "{{ states('sensor.waste_next_papercard') }}"
        icon: mdi:package-variant
        icon_color: amber
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }
