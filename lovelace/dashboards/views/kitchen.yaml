            }

  # Spacer
  - type: custom:button-card
    color_type: blank-card
    styles:
      card:
        - height: 8px
        - background: transparent

  # Entertainment Section Header
  - type: custom:mushroom-title-card
    title: "🎵 Entertainment"
    card_mod:
      style: |
        ha-card {
          background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(186,85,211,0.2), rgba(221,160,221,0.1)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(221,160,221,0.4);
          box-shadow: 0 0 20px rgba(221,160,221,0.3);
          backdrop-filter: blur(10px);
        }

  # Media Player
  - type: custom:mushroom-media-player-card
    entity: media_player.kitchen_dot
    use_media_artwork: true
    use_media_info: true
    show_volume_level: true
    volume_controls:
      - volume_set
      - volume_mute
    media_controls:
      - on_off
      - previous
      - play_pause_stop
      - next
    collapsible_controls: true
    card_mod:
      style: |
        ha-card {
          background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(186,85,211,0.15), rgba(221,160,221,0.1)), linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(221,160,221,0.3);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(10px);
        }
  # Timer Card REMOVED - sensor.kitchen_dot_next_timer has unknown state
  # - type: custom:mushroom-entity-card
  #   entity: sensor.kitchen_dot_next_timer
