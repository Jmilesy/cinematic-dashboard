                  ]]];
                }

                @keyframes pulse {
                  0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
                  50% { transform: scale(1.02); box-shadow: 0 0 18px rgba(0,255,0,0.25); }
                  100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
                }

                @keyframes shimmer {
                  0% { filter: brightness(1); }
                  50% { filter: brightness(1.15); }
                  100% { filter: brightness(1); }
                }

          # Paper/Card
          - type: custom:mushroom-template-card
            primary: Paper/Card
            secondary: "{{ states('sensor.waste_next_papercard') }}"
            icon: mdi:package-variant
            icon_color: amber
            tap_action:
              action: more-info
            visible: >
              {{ true }}
            card_mod:
              style: |
                ha-card {
                  background: [[[ 
                    const base = states['sensor.header_time_period'].attributes.gradient;
                    const weather = states['sensor.header_weather_summary'].attributes.weather_overlay;
                    const tint = states['sensor.header_time_period'].attributes.sun_tint;
                    const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02))";
                    const layers = [shimmer];
                    if (tint !== 'none') layers.push(tint);
                    if (weather !== 'none') layers.push(weather);
                    layers.push(base);
                    return layers.join(", ");
                  ]]];
                  border-radius: 18px;
                  padding: 12px;

                  animation: [[[
                    const rel = states['sensor.waste_next_papercard'].state.split(' ')[0];
                    if (rel === 'tomorrow') return 'pulse 2.5s ease-in-out infinite';
                    if (rel === 'today') return 'shimmer 3s linear infinite';
                    return 'none';
                  ]]];
                }

                @keyframes pulse {
                  0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
                  50% { transform: scale(1.02); box-shadow: 0 0 18px rgba(0,255,0,0.25); }
                  100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
                }

                @keyframes shimmer {
                  0% { filter: brightness(1); }
                  50% { filter: brightness(1.15); }
                  100% { filter: brightness(1); }
                }

  # ENTERTAINMENT & DEVICES
  - type: custom:mushroom-title-card
    subtitle: 🎵 MEDIA & DEVICES
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, rgba(138,43,226,0.15), rgba(75,0,130,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
