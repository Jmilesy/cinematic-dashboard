title: Kitchen
path: kitchen
type: sidebar
theme: Google Dark Theme
cards:

  # ── BACK + TIMER CHIP ─────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: back
      - type: conditional
        conditions:
          - entity: sensor.kitchen_dot_next_timer
            state_not: unavailable
          - entity: sensor.kitchen_dot_next_timer
            state_not: unknown
        chip:
          type: template
          entity: sensor.kitchen_dot_next_timer
          icon: mdi:timer
          content: >
            {% set t = states('sensor.kitchen_dot_next_timer') %}
            {% if 'T' in t %}
              {% set secs = ((as_datetime(t)) - now()).total_seconds() | int %}
              {% if secs > 0 %}
                {{ '%d:%02d' | format(secs // 60, secs % 60) }}
              {% else %}
                Done
              {% endif %}
            {% else %}
              {{ t }}
            {% endif %}
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          margin-bottom: 8px;
        }

  # ── STATS ─────────────────────────────────────────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.kitchen_temperature
        name: TEMP
        template: room_stat
        variables:
          accent: "255,150,0"

      - type: custom:button-card
        entity: sensor.kitchen_humidity
        name: HUMIDITY
        template: room_stat
        variables:
          accent: "100,200,255"

      - type: custom:button-card
        entity: sensor.kitchen_brightness
        name: LIGHT
        template: room_stat
        variables:
          accent: "255,255,80"

  # ── LIGHTING ──────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "💡 LIGHTING"
      accent: "255,200,0"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-light-card
        entity: light.kitchen_light
        name: Main Light
        icon: mdi:ceiling-light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        show_color_temp_control: true
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-light-card
        entity: switch.counter_light
        name: Counter LED
        icon: mdi:led-strip-variant
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── MEDIA ─────────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🎵 MEDIA"
      accent: "138,43,226"

  - type: custom:mushroom-media-player-card
    entity: media_player.kitchen_dot
    use_media_artwork: true
    use_media_info: true
    show_volume_level: true
    volume_controls:
      - volume_set
      - volume_mute
    media_controls:
      - on_off
      - previous
      - play_pause_stop
      - next
    collapsible_controls: true
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.1);
          box-shadow: 0 4px 20px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
        }

  # ── MONITORING ────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🔍 MONITORING"
      accent: "100,200,255"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: binary_sensor.kitchen_pir_sensor
        name: Motion
        icon: mdi:motion-sensor
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      # mmWave presence sensor (named kitchen_mw_sensor — will be LD2410/LD2450)
      - type: custom:mushroom-entity-card
        entity: binary_sensor.kitchen_mw_sensor
        name: Presence
        icon: mdi:radar
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── WASHING MACHINE (full width) ──────────────────────────────────────────
  - type: custom:button-card
    entity: sensor.wash_cycle_status
    name: WASHING MACHINE
    icon: mdi:washing-machine
    show_state: true
    show_label: true
    layout: icon_name_state
    label: |
      [[[
        const remaining = states['sensor.wash_cycle_remaining_time']?.state;
        if (!remaining || ['unavailable','unknown','0'].includes(remaining)) return '';
        return remaining;
      ]]]
    tap_action:
      action: none
    styles:
      card:
        - background: rgba(255,255,255,0.05) !important
        - border-radius: 20px
        - border: |
            [[[
              const s = entity?.state;
              const active = s && !['Stopped','unavailable','unknown'].includes(s);
              return active ? '1px solid rgba(100,200,255,0.3)' : '1px solid rgba(255,255,255,0.1)';
            ]]]
        - box-shadow: |
            [[[
              const s = entity?.state;
              const active = s && !['Stopped','unavailable','unknown'].includes(s);
              return active ? '0 0 16px rgba(100,200,255,0.2),0 4px 20px rgba(0,0,0,0.4)' : '0 4px 20px rgba(0,0,0,0.4)';
            ]]]
        - backdrop-filter: blur(12px)
        - padding: 14px 20px
      icon:
        - width: 36px
        - color: |
            [[[
              const s = entity?.state;
              const active = s && !['Stopped','unavailable','unknown'].includes(s);
              return active ? '#64C8FF' : 'rgba(255,255,255,0.35)';
            ]]]
        - animation: |
            [[[
              const s = entity?.state;
              const active = s && !['Stopped','unavailable','unknown'].includes(s);
              return active ? 'spin 3s linear infinite' : 'none';
            ]]]
      name:
        - font-size: 0.65rem
        - letter-spacing: 0.08em
        - opacity: "0.6"
        - text-align: left
        - text-transform: uppercase
      state:
        - font-size: 1.1rem
        - font-weight: "600"
        - text-align: left
        - color: |
            [[[
              const s = entity?.state;
              if (!s || ['Stopped','unavailable','unknown'].includes(s)) return 'rgba(255,255,255,0.4)';
              return '#64C8FF';
            ]]]
      label:
        - font-size: 0.9rem
        - text-align: left
        - opacity: "0.75"
        - color: "#64C8FF"
    extra_styles: |
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

  # ── WASTE COLLECTION ──────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "♻️ WASTE COLLECTION"
      accent: "80,200,120"

  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.waste_next_combined') }}"
    icon: mdi:trash-can-outline
    icon_color: green
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,0.1);
          box-shadow: 0 4px 20px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          animation: {{ 'pulse 2.5s ease-in-out infinite' if states('sensor.waste_next_relative') == 'tomorrow' else 'none' }};
        }
        @keyframes pulse {
          0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
          50% { box-shadow: 0 0 20px rgba(0,200,80,0.3), 0 4px 20px rgba(0,0,0,0.4); }
        }

  # 2x2 grid so bin type names aren't truncated
  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(2, 1fr)
      grid-gap: 6px
    cards:
      - type: custom:mushroom-template-card
        primary: Refuse
        secondary: "{{ states('sensor.waste_next_refuse') }}"
        icon: mdi:trash-can
        icon_color: blue
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-template-card
        primary: Food
        secondary: "{{ states('sensor.waste_next_food') }}"
        icon: mdi:food
        icon_color: green
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-template-card
        primary: Recycling
        secondary: "{{ states('sensor.waste_next_recycling') }}"
        icon: mdi:recycle
        icon_color: teal
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-template-card
        primary: Paper/Card
        secondary: "{{ states('sensor.waste_next_papercard') }}"
        icon: mdi:package-variant
        icon_color: amber
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 16px;
              border: 1px solid rgba(255,255,255,0.1);
              backdrop-filter: blur(12px);
            }
