title: Kitchen
path: kitchen
type: sidebar
theme: Google Dark Theme
cards:
  # Back Button
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.15);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(10px);
          margin-bottom: 8px;
        }

  # ENVIRONMENTAL INTELLIGENCE GRID (3 COLUMNS)
  - type: grid
    columns: 3
    square: false
    card_mod:
      style:
        grid:
          gap: 4px
    cards:
      # Temperature Card
      - type: custom:button-card
        entity: sensor.kitchen_temperature
        name: TEMP
        layout: vertical
        show_state: true
        state_display: |
          [[[ return (states['sensor.kitchen_temperature'].state || '0') + '°C'; ]]]
        styles:
          card:
            - background: linear-gradient(135deg, rgba(255,150,0,0.15), rgba(255,100,0,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
            - border-radius: 16px
            - border: 1px solid rgba(255,150,0,0.3)
            - box-shadow: 0 0 20px rgba(255,150,0,0.2), 0 4px 16px rgba(0,0,0,0.3)
            - backdrop-filter: blur(10px)
            - padding: 16px
          state:
            - color: '#FFA500'
            - font-weight: bold
            - font-size: 24px

      # Brightness Card
      - type: custom:button-card
        entity: sensor.kitchen_brightness
        name: BRIGHTNESS
        layout: vertical
        show_state: true
        state_display: |
          [[[ return (states['sensor.kitchen_brightness'].state || '0') + '%'; ]]]
        styles:
          card:
            - background: linear-gradient(135deg, rgba(255,255,0,0.15), rgba(255,200,0,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
            - border-radius: 16px
            - border: 1px solid rgba(255,255,0,0.3)
            - box-shadow: 0 0 20px rgba(255,255,0,0.2), 0 4px 16px rgba(0,0,0,0.3)
            - backdrop-filter: blur(10px)
            - padding: 16px
          state:
            - color: '#FFFF00'
            - font-weight: bold
            - font-size: 24px

      # Motion Detection
      - type: custom:button-card
        entity: binary_sensor.kitchen_motion
        name: MOTION
        layout: vertical
        icon: |
          [[[
            return states['binary_sensor.kitchen_motion'].state === 'on' ? 'mdi:motion-sensor' : 'mdi:motion-sensor-off';
          ]]]
        styles:
          card:
            - background: linear-gradient(135deg, rgba(100,255,200,0.15), rgba(50,255,150,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
            - border-radius: 16px
            - border: 1px solid rgba(100,255,200,0.3)
            - box-shadow: 0 0 20px rgba(100,255,200,0.2), 0 4px 16px rgba(0,0,0,0.3)
            - backdrop-filter: blur(10px)
            - padding: 16px
          state:
            - color: '[[[return states["binary_sensor.kitchen_motion"].state === "on" ? "#64FFC8" : "#888888";]]]'
            - font-weight: bold
            - font-size: 14px

  # LIGHTING SYSTEM
  - type: custom:mushroom-title-card
    subtitle: 💡 LIGHTING
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, rgba(255,200,0,0.15), rgba(255,150,0,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(255,200,0,0.3);
          box-shadow: 0 0 25px rgba(255,200,0,0.15);
          backdrop-filter: blur(10px);
        }

  - type: grid
    columns: 2
    square: false
    card_mod:
      style:
        grid:
          gap: 4px
    cards:
      - type: custom:mushroom-light-card
        entity: light.kitchen_light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        show_color_temp_control: true
        name: Main Light
        icon: mdi:lightbulb-on
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.15);
              box-shadow: 0 8px 32px rgba(0,0,0,0.4);
              backdrop-filter: blur(10px);
            }

      - type: custom:mushroom-light-card
        entity: light.kitchen_light_2
        use_light_color: true
        show_brightness_control: true
        icon: mdi:lightbulb-multiple
        name: Secondary Light
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.15);
              box-shadow: 0 8px 32px rgba(0,0,0,0.4);
              backdrop-filter: blur(10px);
            }
# --- Waste Collection ---------------------------------------------------------
  - type: vertical-stack
    cards:

      # Header
      - type: custom:mushroom-title-card
        title: ♻️ Waste Collection
        subtitle: Upcoming bin schedule for your property
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
            }

      # Combined Summary (Cinematic + Animation)
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.waste_next_combined') }}"
        icon: mdi:trash-can-outline
        icon_color: green
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              background: [[[ 
                const base = states['sensor.header_time_period'].attributes.gradient;
                const weather = states['sensor.header_weather_summary'].attributes.weather_overlay;
                const tint = states['sensor.header_time_period'].attributes.sun_tint;
                const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02))";
                const layers = [shimmer];
                if (tint !== 'none') layers.push(tint);
                if (weather !== 'none') layers.push(weather);
                layers.push(base);
                return layers.join(", ");
              ]]];
              border-radius: 18px;
              padding: 12px;

              animation: [[[
                const rel = states['sensor.waste_next_relative'].state;
                if (rel === 'tomorrow') return 'pulse 2.5s ease-in-out infinite';
                if (rel === 'today') return 'shimmer 3s linear infinite';
                return 'none';
              ]]];
            }

            @keyframes pulse {
              0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
              50% { transform: scale(1.02); box-shadow: 0 0 18px rgba(0,255,0,0.25); }
              100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
            }

            @keyframes shimmer {
              0% { filter: brightness(1); }
              50% { filter: brightness(1.15); }
              100% { filter: brightness(1); }
            }

      # Per-Type Cards (Reactive + Animated)
      - type: horizontal-stack
        cards:

          # Refuse
          - type: custom:mushroom-template-card
            primary: Refuse
            secondary: "{{ states('sensor.waste_next_refuse') }}"
            icon: mdi:trash-can
            icon_color: blue
            tap_action:
              action: more-info
            visible: >
              {{ true }}
            card_mod:
              style: |
                ha-card {
                  background: [[[ 
                    const base = states['sensor.header_time_period'].attributes.gradient;
                    const weather = states['sensor.header_weather_summary'].attributes.weather_overlay;
                    const tint = states['sensor.header_time_period'].attributes.sun_tint;
                    const shimmer = "linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02))";
                    const layers = [shimmer];
                    if (tint !== 'none') layers.push(tint);
                    if (weather !== 'none') layers.push(weather);
                    layers.push(base);
                    return layers.join(", ");
                  ]]];
                  border-radius: 18px;
                  padding: 12px;

                  animation: [[[
                    const rel = states['sensor.waste_next_refuse'].state.split(' ')[0];
                    if (rel === 'tomorrow') return 'pulse 2.5s ease-in-out infinite';
                    if (rel === 'today') return 'shimmer 3s linear infinite';
                    return 'none';
                  ]]];
                }

                @keyframes pulse {
                  0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
                  50% { transform: scale(1.02); box-shadow: 0 0 18px rgba(0,255,0,0.25); }
                  100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,255,0,0.0); }
                }

                @keyframes shimmer {
                  0% { filter: brightness(1); }
                  50% { filter: brightness(1.15); }
                  100% { filter: brightness(1); }
                }

          # Food
          - type: custom:mushroom-template-card
            primary: Food
            secondary: "{{ states('sensor.waste_next_food') }}"
            icon: mdi:food
            icon_color: green
            tap_action:
