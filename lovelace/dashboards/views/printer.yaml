title: 3D Printer
path: printer
type: sidebar
theme: Google Dark Theme
cards:

  # ── BACK ──────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          margin-bottom: 8px;
        }

  # ── STATUS HERO ───────────────────────────────────────────────────────────
  - type: custom:mushroom-template-card
    primary: >
      {% set state = states('sensor.octoprint_current_state') %}
      {% set power = states('switch.smart_switch_2303160492260254060548e1e9bdf565_outlet_3') %}
      {% if power == 'off' %}
        PRINTER POWER OFF
      {% elif state in ['unavailable', 'unknown', 'none', ''] %}
        OCTOPRINT OFFLINE
      {% else %}
        {{ state | upper }}
      {% endif %}
    secondary: >
      {% set state = states('sensor.octoprint_current_state') %}
      {% set power = states('switch.smart_switch_2303160492260254060548e1e9bdf565_outlet_3') %}
      {% set file = states('sensor.octoprint_current_file') %}
      {% set pct = states('sensor.octoprint_job_percentage') | round(1) %}
      {% if power == 'off' %}
        Use the 3D Printer power switch below to wake the printer
      {% elif state in ['unavailable', 'unknown', 'none', ''] %}
        OctoPrint is reachable at 10.0.0.103, but the printer is not operational
      {% elif states('binary_sensor.octoprint_printing') == 'on' %}
        {{ file }} · {{ pct }}%
      {% elif file not in ['unavailable', 'unknown', ''] %}
        {{ file }}
      {% else %}
        Ready for print
      {% endif %}
    icon: mdi:printer-3d-nozzle
    icon_color: >
      {% if states('binary_sensor.octoprint_printing_error') == 'on' %}
        red
      {% elif states('binary_sensor.octoprint_printing') == 'on' %}
        cyan
      {% elif states('sensor.octoprint_current_state') == 'Paused' %}
        orange
      {% else %}
        grey
      {% endif %}
    card_mod:
      style: |
        {% set printing = states('binary_sensor.octoprint_printing') == 'on' %}
        {% set error = states('binary_sensor.octoprint_printing_error') == 'on' %}
        {% set paused = states('sensor.octoprint_current_state') == 'Paused' %}
        ha-card {
          background: {% if error %}linear-gradient(135deg, rgba(255,60,60,0.2), rgba(255,60,60,0.08)){% elif printing %}linear-gradient(135deg, rgba(0,188,212,0.2), rgba(0,188,212,0.08)){% elif paused %}linear-gradient(135deg, rgba(255,165,0,0.2), rgba(255,165,0,0.08)){% else %}rgba(255,255,255,0.05){% endif %} !important;
          border-radius: 20px;
          border: 1px solid {% if error %}rgba(255,60,60,0.45){% elif printing %}rgba(0,188,212,0.45){% elif paused %}rgba(255,165,0,0.4){% else %}rgba(255,255,255,0.12){% endif %};
          box-shadow: {% if error %}0 0 35px rgba(255,60,60,0.4), {% elif printing %}0 0 35px rgba(0,188,212,0.3), {% elif paused %}0 0 25px rgba(255,165,0,0.25), {% endif %}0 8px 32px rgba(0,0,0,0.5);
          backdrop-filter: blur(12px);
          {% if printing %}animation: printerPulse 2.5s ease-in-out infinite;{% endif %}
          {% if error %}animation: errorPulse 1s ease-in-out infinite;{% endif %}
        }
        @keyframes printerPulse {
          0%, 100% { box-shadow: 0 0 20px rgba(0,188,212,0.2), 0 8px 32px rgba(0,0,0,0.5); }
          50%       { box-shadow: 0 0 50px rgba(0,188,212,0.6), 0 8px 32px rgba(0,0,0,0.5); }
        }
        @keyframes errorPulse {
          0%, 100% { box-shadow: 0 0 20px rgba(255,60,60,0.3), 0 8px 32px rgba(0,0,0,0.5); }
          50%       { box-shadow: 0 0 60px rgba(255,60,60,0.8), 0 8px 32px rgba(0,0,0,0.5); }
        }

  # ── STATS ─────────────────────────────────────────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.octoprint_actual_tool0_temp
        name: NOZZLE
        template: room_stat
        variables:
          accent: "255,120,0"

      - type: custom:button-card
        entity: sensor.octoprint_actual_bed_temp
        name: BED
        template: room_stat
        variables:
          accent: "255,60,80"

      - type: custom:button-card
        entity: sensor.octoprint_job_percentage
        name: PROGRESS
        template: room_stat
        variables:
          accent: "0,200,120"

  # ── LIVE VIEW ─────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "📷 LIVE VIEW"
      accent: "0,188,212"

  - type: picture-entity
    entity: camera.octoprint_camera
    show_name: false
    show_state: false
    camera_view: live
    card_mod:
      style: |
        ha-card {
          border-radius: 20px;
          overflow: hidden;
          border: 1px solid rgba(0,188,212,0.3);
          box-shadow: 0 0 30px rgba(0,188,212,0.2), 0 8px 32px rgba(0,0,0,0.5);
        }
        hui-image {
          transform: rotate(180deg);
        }

  # ── PRINT PROGRESS ────────────────────────────────────────────────────────
  - type: custom:button-card
    entity: sensor.octoprint_job_percentage
    name: PRINT PROGRESS
    show_state: true
    state_display: "[[[ return (parseFloat(entity.state) || 0).toFixed(1) + '%'; ]]]"
    show_icon: false
    styles:
      card:
        - background: >
            [[[
              const pct = parseFloat(entity.state) || 0;
              return `linear-gradient(90deg, rgba(0,200,120,0.35) ${pct}%, rgba(255,255,255,0.04) ${pct}%)`;
            ]]]
        - border-radius: 20px
        - border: 1px solid rgba(0,200,120,0.3)
        - box-shadow: 0 4px 20px rgba(0,0,0,0.4)
        - backdrop-filter: blur(12px)
        - padding: 20px
        - transition: background 1s ease
      state:
        - font-size: 36px
        - font-weight: 700
        - color: rgba(255,255,255,0.95)
      name:
        - font-size: 11px
        - font-weight: 600
        - letter-spacing: 2px
        - color: rgba(255,255,255,0.45)

  # ── PRINT JOB ─────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🖨️ PRINT JOB"
      accent: "0,188,212"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr))
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.octoprint_current_file
        name: File
        icon: mdi:file-outline
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(0,188,212,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: sensor.octoprint_estimated_finish_time
        name: ETA
        icon: mdi:clock-end
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(0,188,212,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: sensor.octoprint_start_time
        name: Started
        icon: mdi:clock-start
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(0,188,212,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── TEMPERATURES ──────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🌡️ TEMPERATURES"
      accent: "255,100,0"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: 1fr 1fr
      grid-gap: 8px
    cards:
      - type: sensor
        entity: sensor.octoprint_actual_tool0_temp
        graph: line
        hours_to_show: 4
        detail: 2
        name: Nozzle
        unit: °C
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,120,0,0.3);
              box-shadow: 0 0 20px rgba(255,120,0,0.2), 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: sensor
        entity: sensor.octoprint_actual_bed_temp
        graph: line
        hours_to_show: 4
        detail: 2
        name: Bed
        unit: °C
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,60,80,0.3);
              box-shadow: 0 0 20px rgba(255,60,80,0.2), 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: 1fr 1fr
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: number.octoprint_extruder_temperature
        name: Nozzle Target
        icon: mdi:thermometer-chevron-up
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,120,0,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: number.octoprint_bed_temperature
        name: Bed Target
        icon: mdi:thermometer-chevron-up
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,60,80,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── CONTROLS ──────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "🎮 PRINT CONTROLS"
      accent: "100,200,255"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: repeat(3, 1fr)
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: button.octoprint_pause_job
        name: Pause
        icon: mdi:pause-circle
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.octoprint_pause_job
        card_mod:
          style: |
            ha-card {
              background: rgba(255,165,0,0.1) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,165,0,0.35);
              box-shadow: 0 0 18px rgba(255,165,0,0.2), 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: button.octoprint_resume_job
        name: Resume
        icon: mdi:play-circle
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.octoprint_resume_job
        card_mod:
          style: |
            ha-card {
              background: rgba(0,200,100,0.1) !important;
              border-radius: 20px;
              border: 1px solid rgba(0,200,100,0.35);
              box-shadow: 0 0 18px rgba(0,200,100,0.2), 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: button.octoprint_stop_job
        name: Stop
        icon: mdi:stop-circle
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.octoprint_stop_job
        card_mod:
          style: |
            ha-card {
              background: rgba(255,60,60,0.1) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,60,60,0.35);
              box-shadow: 0 0 18px rgba(255,60,60,0.2), 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── POWER ─────────────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "⚡ POWER"
      accent: "255,200,50"

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: 1fr 1fr
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: switch.smart_switch_2303160492260254060548e1e9bdf565_outlet_3
        name: Printer PSU
        icon: mdi:power
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,200,50,0.3);
              box-shadow: 0 0 20px rgba(255,200,50,0.2), 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: button.octoprint_restart_octoprint
        name: Restart OctoPrint
        icon: mdi:restart
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.octoprint_restart_octoprint
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(255,255,255,0.12);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

  # ── WLED LIGHTING ─────────────────────────────────────────────────────────
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "💡 PRINTER LIGHTING"
      accent: "200,50,255"

  - type: custom:mushroom-light-card
    entity: light.3dprinterwled
    name: WLED Strip
    use_light_color: true
    show_brightness_control: true
    show_color_control: true
    tap_action:
      action: toggle
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(200,50,255,0.3);
          box-shadow: 0 0 28px rgba(200,50,255,0.2), 0 8px 32px rgba(0,0,0,0.5);
          backdrop-filter: blur(12px);
        }

  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: 1fr 1fr
      grid-gap: 8px
    cards:
      - type: custom:mushroom-entity-card
        entity: select.3dprinterwled_preset
        name: Preset
        icon: mdi:palette
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(200,50,255,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }

      - type: custom:mushroom-entity-card
        entity: select.3dprinterwled_live_override
        name: Override
        icon: mdi:palette-swatch
        card_mod:
          style: |
            ha-card {
              background: rgba(255,255,255,0.05) !important;
              border-radius: 20px;
              border: 1px solid rgba(200,50,255,0.2);
              box-shadow: 0 4px 20px rgba(0,0,0,0.4);
              backdrop-filter: blur(12px);
            }
