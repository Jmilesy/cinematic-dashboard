title: Dining Room
path: diningroom
type: sidebar
theme: Google Dark Theme
cards:

  # ── BACK ──────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(12px);
          margin-bottom: 8px;
        }

  # ── STATS ─────────────────────────────────────────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.dining_room_temperature
        name: TEMP
        template: room_stat
        variables:
          accent: "255,150,0"

      - type: custom:button-card
        entity: sensor.dining_room_humidity
        name: HUMIDITY
        template: room_stat
        variables:
          accent: "100,200,255"

      # No brightness sensor yet — shows — until sensor deployed
      - type: custom:button-card
        name: LIGHT
        template: room_stat
        variables:
          accent: "255,255,80"

  # ── NOTE ──────────────────────────────────────────────────────────────────
  # Dining room has dumb lights — no lighting controls available.
  # Placeholder until smart lighting is added.
  - type: custom:button-card
    template: room_section_title
    variables:
      title: "💡 LIGHTING — dumb lights, no control"
      accent: "120,120,120"
