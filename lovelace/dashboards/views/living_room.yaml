title: Living Room
path: livingroom
type: sidebar
theme: Google Dark Theme
cards:
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    alignment: center
    card_mod:
      style: |
        ha-card {
          background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.15);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          backdrop-filter: blur(10px);
          margin-bottom: 8px;
        }

  # ENVIRONMENTAL INTELLIGENCE GRID (3 COLUMNS)
  - type: grid
    columns: 3
    square: false
    card_mod:
      style:
        grid:
          gap: 4px
    cards:
      # Temperature Card
      - type: custom:button-card
        entity: sensor.first_air_quality_monitor_temperature
        name: TEMP
        layout: vertical
        show_state: true
        state_display: |
          [[[ return (states['sensor.first_air_quality_monitor_temperature'].state || '0') + '°C'; ]]]
        styles:
          card:
            - background: linear-gradient(135deg, rgba(255,150,0,0.15), rgba(255,100,0,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
            - border-radius: 16px
            - border: 1px solid rgba(255,150,0,0.3)
            - box-shadow: 0 0 20px rgba(255,150,0,0.2), 0 4px 16px rgba(0,0,0,0.3)
            - backdrop-filter: blur(10px)
            - padding: 16px
          state:
            - color: '#FFA500'
            - font-weight: bold
            - font-size: 24px

      # Humidity & Air Quality Cards REMOVED - sensor.first_air_quality_monitor_humidity and sensor.first_air_quality_monitor_indoor_air_quality unavailable
      # - type: custom:button-card
      #   entity: sensor.first_air_quality_monitor_humidity
      #   name: HUMIDITY
      #   layout: vertical
      #   show_state: true
        state_display: |
          [[[ return (states['sensor.first_air_quality_monitor_humidity'].state || '0') + '%'; ]]]
        styles:
          card:
            - background: linear-gradient(135deg, rgba(100,200,255,0.15), rgba(50,150,255,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
            - border-radius: 16px
            - border: 1px solid rgba(100,200,255,0.3)
            - box-shadow: 0 0 20px rgba(100,200,255,0.2), 0 4px 16px rgba(0,0,0,0.3)
            - backdrop-filter: blur(10px)
            - padding: 16px
          state:
            - color: '#64C8FF'
            - font-weight: bold
            - font-size: 24px

      # Air Quality Card REMOVED - sensor.first_air_quality_monitor_indoor_air_quality unavailable

  # MEDIA & ENTERTAINMENT
  - type: custom:mushroom-title-card
    subtitle: 🎬 MEDIA & ENTERTAINMENT
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, rgba(138,43,226,0.15), rgba(75,0,130,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(138,43,226,0.3);
          box-shadow: 0 0 25px rgba(138,43,226,0.15);
          backdrop-filter: blur(10px);
        }

  - type: custom:mushroom-media-player-card
    entity: media_player.living_room_tv
    use_media_artwork: true
    use_media_info: true
    show_volume_level: true
    volume_controls:
      - volume_set
      - volume_mute
    media_controls:
      - on_off
      - previous
      - play_pause_stop
      - next
    card_mod:
      style: |
        ha-card {
          background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(138,43,226,0.1), rgba(75,0,130,0.05)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(138,43,226,0.25);
          box-shadow: 0 8px 32px rgba(0,0,0,0.3);
          backdrop-filter: blur(10px);
        }

  # LIGHTING
  - type: custom:mushroom-title-card
    subtitle: 💡 LIGHTING
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, rgba(255,200,0,0.15), rgba(255,150,0,0.08)), {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
          border-radius: 20px;
          border: 1px solid rgba(255,200,0,0.3);
          box-shadow: 0 0 25px rgba(255,200,0,0.15);
          backdrop-filter: blur(10px);
        }

  - type: grid
    columns: 2
    square: false
    card_mod:
      style:
        grid:
          gap: 4px
    cards:
      - type: custom:mushroom-light-card
        entity: light.medicine
        name: Main Light
        use_light_color: true
        card_mod:
          style: |
            ha-card {
              background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,200,0,0.1), rgba(255,150,0,0.05)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
              border-radius: 16px;
              border: 1px solid rgba(255,200,0,0.25);
              box-shadow: 0 4px 16px rgba(0,0,0,0.3);
              backdrop-filter: blur(10px);
            }

      - type: custom:mushroom-light-card
        entity: light.valance_2
        name: Valance
        use_light_color: true
        card_mod:
          style: |
            ha-card {
              background: {% set base = state_attr('sensor.header_time_period','gradient') %}{% set weather = state_attr('sensor.header_weather_summary','weather_overlay') %}{% set sun = state_attr('sensor.header_time_period','sun_tint') %}linear-gradient(135deg, rgba(255,200,0,0.1), rgba(255,150,0,0.05)){% if sun != 'none' %}, {{ sun }}{% endif %}{% if weather != 'none' %}, {{ weather }}{% endif %}, {{ base }} !important;
              border-radius: 16px;
              border: 1px solid rgba(255,200,0,0.25);
              box-shadow: 0 4px 16px rgba(0,0,0,0.3);
              backdrop-filter: blur(10px);
            }
        use_light_color: true
      # LED Strip Card REMOVED - light.living_room_led missing
      # - type: custom:mushroom-light-card
      #   entity: light.living_room_led
      #   name: LED Strip
      #   tap_action:
      #     action: toggle

  - type: custom:button-card
    color_type: blank-card
    styles:
      card:
        - height: 12px
        - background: transparent
