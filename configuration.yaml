# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /hacsfiles/kiosk-mode/kiosk-mode.js

lovelace:
  # resources: !include lovelace/resources/resources.yaml
  dashboards:
    cinematic-dashboard:
      mode: yaml
      title: Cinematic
      icon: mdi:movie-open
      show_in_sidebar: true
      filename: lovelace/cinematic-dashboard.yaml

    cinematic-v2:
      mode: yaml
      title: Cinematic V2
      icon: mdi:filmstrip
      show_in_sidebar: true
      filename: lovelace/cinematic-v2.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Template sensors (loads all YAML files in templates/ folder)
template: !include_dir_merge_list templates/

homeassistant:
  allowlist_external_dirs:
    - "/media"
  auth_providers:
    - type: homeassistant
    - type: trusted_networks
      trusted_networks:
        - 10.0.0.0/24
      trusted_users:
        192.168.1.43: a663b3fdb7874445be8a4dfefaee08d9

# ============================================================
# Waste Collection Schedule – Source Configuration
# ============================================================
waste_collection_schedule:
  sources:
    - name: dover_gov_uk
      args:
        uprn: "10034882837"
      customize:
        - type: REFUSE
          alias: "Refuse Collection"
          icon: mdi:trash-can-outline
        - type: FOOD
          alias: "Food Collection"
          icon: mdi:food
        - type: RECYCLING
          alias: "Recycling Collection"
          icon: mdi:recycle
        - type: PAPERCARD
          alias: "Paper/Card Collection"
          icon: mdi:package-variant

# ============================================================
# Waste Collection Schedule – Platform Sensor
# ============================================================
sensor:
  - platform: waste_collection_schedule
    name: "Next Waste Collection"
    source_index: 0
    count: 3
    leadtime: 60
    add_days_to: true


notify:
  - platform: group
    name: jon_notify
    services:
      - service: mobile_app_jon_phone
      
  - platform: group
    name: jacob_notify
    services:
      - service: mobile_app_sm_g990b2
      
  - platform: group
    name: joseph_notify
    services:
      - service: mobile_app_joseph
      
  - platform: group
    name: natalie_notify
    services:
      - service: mobile_app_sm_a566b 

recorder:
  purge_keep_days: 30
  purge_interval: 1
  commit_interval: 30
  exclude:
    entities:
      # Add any entities that change too frequently here
      - sensor.sm_g990b2_active_notification_count  # This one was causing large attributes
    

input_boolean:
  alert_active:
    name: Alert Active
    icon: mdi:alert
  natalie_makeup:
    name: Natalie Makeup Light
    icon: mdi:mirror

wake_on_lan:

rest_command:
  shutdown_jon_pc:
    url: "http://192.168.1.107:8000/?action=System.Shutdown"
    method: POST
  shutdown_games_pc:
    url: "http://192.168.1.108:8000/?action=System.Shutdown"
    method: POST

