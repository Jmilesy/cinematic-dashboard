# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /hacsfiles/kiosk-mode/kiosk-mode.js

lovelace:
  # resources: !include lovelace/resources/resources.yaml
  dashboards:
    cinematic-dashboard:
      mode: yaml
      title: Cinematic
      icon: mdi:movie-open
      show_in_sidebar: true
      filename: lovelace/cinematic-dashboard.yaml

    cinematic-v2:
      mode: yaml
      title: Cinematic V2
      icon: mdi:filmstrip
      show_in_sidebar: true
      filename: lovelace/cinematic-v2.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Template sensors (loads all YAML files in templates/ folder)
template: !include_dir_merge_list templates/

command_line:
  - sensor:
      name: Met Office Pollen London South East
      unique_id: met_office_pollen_london_south_east
      command: "python3 /config/scripts/met_office_pollen.py"
      scan_interval: 21600
      value_template: "{{ value_json.today_level }}"
      json_attributes:
        - region
        - summary
        - forecast_codes
        - forecast_levels
        - issued
        - source

homeassistant:
  allowlist_external_dirs:
    - "/media"
  auth_providers:
    - type: homeassistant
    - type: trusted_networks
      trusted_networks:
        - 10.0.0.0/24
      trusted_users:
        192.168.1.43: a663b3fdb7874445be8a4dfefaee08d9


# ============================================================
# Waste Collection Schedule – Source Configuration
# ============================================================
waste_collection_schedule:
  sources:
    - name: dover_gov_uk
      args:
        uprn: "10034882837"
      customize:
        - type: REFUSE
          alias: "Refuse Collection"
          icon: mdi:trash-can-outline
        - type: FOOD
          alias: "Food Collection"
          icon: mdi:food
        - type: RECYCLING
          alias: "Recycling Collection"
          icon: mdi:recycle
        - type: PAPERCARD
          alias: "Paper/Card Collection"
          icon: mdi:package-variant

# ============================================================
# Waste Collection Schedule – Platform Sensor
# ============================================================
sensor:
  - platform: waste_collection_schedule
    name: "Next Waste Collection"
    source_index: 0
    count: 3
    leadtime: 60
    add_days_to: true

notify:
  - platform: group
    name: jon_notify
    services:
      - service: mobile_app_jon_phone

  - platform: group
    name: jacob_notify
    services:
      - service: mobile_app_jacob_phone

  - platform: group
    name: joseph_notify
    services:
      - service: mobile_app_joseph

  - platform: group
    name: natalie_notify
    services:
      - service: mobile_app_sm_a566b

mqtt:
  sensor:
    - name: "Alarm Panel Heartbeat"
      unique_id: alarm_panel_hbeatret
      state_topic: alarm/hbeatret
      expire_after: 120
      icon: mdi:shield-home

recorder:
  purge_keep_days: 30
  commit_interval: 30
  exclude:
    entities:
      # High-churn diagnostic/display helpers that do not need history.
      - sensor.jacob_phone_active_notification_count # This one was causing large attributes
      - sensor.header_current_time
      - sensor.boys_room_jacob_svg_x
      - sensor.boys_room_jacob_svg_y
      - sensor.boys_room_joseph_svg_x
      - sensor.boys_room_joseph_svg_y
      - sensor.boys_room_jacob_dot_style
      - sensor.boys_room_joseph_dot_style
      - sensor.system_monitor_load_1m
      - sensor.system_monitor_load_5m
      - sensor.system_monitor_load_15m
      - sensor.system_monitor_processor_use
      - sensor.system_monitor_memory_usage
      - sensor.system_monitor_processor_temperature

input_boolean:
  alert_active:
    name: Alert Active
    icon: mdi:alert
  natalie_makeup:
    name: Natalie Makeup Light
    icon: mdi:mirror

input_button:
  start_jon_pc:
    name: Start Jon PC
    icon: mdi:desktop-tower

input_select:
  rotary_ui_state:
    name: Rotary UI State
    options:
      - front
      - menu
      - page_school
      - page_jacob
      - page_bedtime
      - page_alerts
      - page_alarm
    initial: front
  rotary_day:
    name: Rotary Day
    options:
      - Today
      - Tomorrow
    initial: Today

input_number:
  rotary_menu_index:
    name: Rotary Menu Index
    min: 0
    max: 9
    step: 1
    mode: box
    initial: 0

timer:
  rotary_ui_timeout:
    name: Rotary UI Timeout
    duration: "00:00:15"

input_text:
  jacob_timetable_today:
    name: Jacob Timetable Today
    max: 255
  jacob_timetable_tomorrow:
    name: Jacob Timetable Tomorrow
    max: 255

wake_on_lan:

emulated_hue:
  host_ip: 192.168.1.104
  listen_port: 80
  expose_by_default: false
  entities:
    input_boolean.boys_bedtime_switch:
      name: "Sleep Mode"
      hidden: false

http:
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.1.76
    - 127.0.0.1

rest_command:
  shutdown_jon_pc:
    url: "http://192.168.1.107:8000/?action=System.Shutdown"
    method: POST
  shutdown_games_pc:
    url: "http://192.168.1.108:8000/?action=System.Shutdown"
    method: POST
  valance_sunrise:
    url: "http://10.0.0.50/win&A=0&NL=10&NT=255&NF=3"
    method: GET
