sensor:
  - name: "Washing Machine Status"
    unique_id: washing_machine_status
    state: >
      {% from 'macros/appliance_macros.jinja' import typed_state %}
      {{ typed_state('switch.washing_machine', 'appliance') }}
    attributes: >
      {% from 'macros/appliance_macros.jinja' import attributes %}
      {{ attributes('switch.washing_machine', 'appliance') | from_json }}

  - name: "Kitchen Timer Status"
    unique_id: kitchen_timer_status
    state: >
      {% from 'macros/appliance_macros.jinja' import typed_state %}
      {{ typed_state('timer.kitchen', 'timer') }}
    attributes: >
      {% from 'macros/appliance_macros.jinja' import attributes %}
      {{ attributes('timer.kitchen', 'timer') | from_json }}

