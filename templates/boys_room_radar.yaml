# LD2450 target positions mapped to SVG coordinates
# ── CALIBRATION VALUES ──────────────────────────────────────
# sensor_svg_x: 646  sensor_svg_y: 266
# scale_x: 0.079     scale_y: 0.056
# Boys room SVG bounds: x=513-898, y=180-546
#
# ── BUNK ASSIGNMENT ─────────────────────────────────────────
# Target numbers (T1/T2/T3) are not stable — sensor reassigns
# them frame-to-frame. Instead we classify by X position:
#   Jacob  (top bunk, right side): X > +500mm  → dot #ff4444
#   Joseph (bot bunk, left side):  X < -500mm  → dot #ff00ff
# Source: 7-night 03:00-05:00 history. Jacob avg ~+2700mm,
# Joseph avg ~-1400mm. No overlap observed.
# When not detected, cx is set to -100 (off-screen left).

- sensor:
    - name: boys_room_jacob_svg_x
      unit_of_measurement: px
      state: >
        {% set sensor_svg_x = 646 %}
        {% set scale_x = 0.079 %}
        {% set ns = namespace(x=none) %}
        {% for t in [1, 2, 3] %}
          {% set x = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% if x is not none and x > 500 and ns.x is none %}
            {% set ns.x = x %}
          {% endif %}
        {% endfor %}
        {{ (sensor_svg_x + ns.x * scale_x) | round(1) if ns.x is not none else -100 }}

    - name: boys_room_jacob_svg_y
      unit_of_measurement: px
      state: >
        {% set sensor_svg_y = 266 %}
        {% set scale_y = 0.056 %}
        {% set ns = namespace(y=none) %}
        {% for t in [1, 2, 3] %}
          {% set x = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% set y = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_y') | float(none) %}
          {% if x is not none and x > 500 and y is not none and ns.y is none %}
            {% set ns.y = y %}
          {% endif %}
        {% endfor %}
        {{ (sensor_svg_y + ns.y * scale_y) | round(1) if ns.y is not none else 363 }}

    - name: boys_room_joseph_svg_x
      unit_of_measurement: px
      state: >
        {% set sensor_svg_x = 646 %}
        {% set scale_x = 0.079 %}
        {% set ns = namespace(x=none) %}
        {% for t in [1, 2, 3] %}
          {% set x = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% if x is not none and x < -500 and ns.x is none %}
            {% set ns.x = x %}
          {% endif %}
        {% endfor %}
        {{ (sensor_svg_x + ns.x * scale_x) | round(1) if ns.x is not none else -100 }}

    - name: boys_room_joseph_svg_y
      unit_of_measurement: px
      state: >
        {% set sensor_svg_y = 266 %}
        {% set scale_y = 0.056 %}
        {% set ns = namespace(y=none) %}
        {% for t in [1, 2, 3] %}
          {% set x = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% set y = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_y') | float(none) %}
          {% if x is not none and x < -500 and y is not none and ns.y is none %}
            {% set ns.y = y %}
          {% endif %}
        {% endfor %}
        {{ (sensor_svg_y + ns.y * scale_y) | round(1) if ns.y is not none else 363 }}

    - name: boys_room_light_fill
      state: >
        {% set l = states.light.boys_light %}
        {% if l.state == 'on' %}
          {% if l.attributes.rgb_color %}
            {% set r,g,b = l.attributes.rgb_color %}
            fill: rgba({{ r }},{{ g }},{{ b }},0.35) !important;
          {% else %}
            fill: rgba(255,220,80,0.35) !important;
          {% endif %}
        {% else %}
          fill: transparent !important;
        {% endif %}

    - name: bedroom_light_fill
      state: >
        {% set l = states.light.bedroom_light %}
        {% if l.state == 'on' %}
          {% if l.attributes.rgb_color %}
            {% set r,g,b = l.attributes.rgb_color %}
            fill: rgba({{ r }},{{ g }},{{ b }},0.35) !important;
          {% else %}
            fill: rgba(255,220,80,0.35) !important;
          {% endif %}
        {% else %}
          fill: transparent !important;
        {% endif %}

    - name: landing_light_fill
      state: >
        {% set l = states.light.hall_light %}
        {% if l.state == 'on' %}
          {% if l.attributes.rgb_color %}
            {% set r,g,b = l.attributes.rgb_color %}
            fill: rgba({{ r }},{{ g }},{{ b }},0.35) !important;
          {% else %}
            fill: rgba(255,220,80,0.35) !important;
          {% endif %}
        {% else %}
          fill: transparent !important;
        {% endif %}

    - name: boys_room_jacob_dot_style
      state: >
        {% set sensor_svg_x = 646 %}
        {% set sensor_svg_y = 266 %}
        {% set scale_x = 0.079 %}
        {% set scale_y = 0.056 %}
        {% set presence = states('binary_sensor.mmwave_test_bed_ld2450_presence') %}
        {% set ns = namespace(x=none, y=none) %}
        {% for t in [1, 2, 3] %}
          {% set tx = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% set ty = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_y') | float(none) %}
          {% if tx is not none and ty is not none and tx > 500 and ns.x is none %}
            {% set ns.x = tx %}
            {% set ns.y = ty %}
          {% endif %}
        {% endfor %}
        {{ 'cx: ' ~ (sensor_svg_x + ns.x * scale_x) | round(1) ~ 'px; cy: ' ~ (sensor_svg_y + ns.y * scale_y) | round(1) ~ 'px;' if ns.x is not none and presence == 'on' else 'cx: -100px;' }}

    - name: boys_room_joseph_dot_style
      state: >
        {% set sensor_svg_x = 646 %}
        {% set sensor_svg_y = 266 %}
        {% set scale_x = 0.079 %}
        {% set scale_y = 0.056 %}
        {% set presence = states('binary_sensor.mmwave_test_bed_ld2450_presence') %}
        {% set ns = namespace(x=none, y=none) %}
        {% for t in [1, 2, 3] %}
          {% set tx = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% set ty = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_y') | float(none) %}
          {% if tx is not none and ty is not none and tx < -500 and ns.x is none %}
            {% set ns.x = tx %}
            {% set ns.y = ty %}
          {% endif %}
        {% endfor %}
        {{ 'cx: ' ~ (sensor_svg_x + ns.x * scale_x) | round(1) ~ 'px; cy: ' ~ (sensor_svg_y + ns.y * scale_y) | round(1) ~ 'px;' if ns.x is not none and presence == 'on' else 'cx: -100px;' }}

    - name: boys_room_bed_radar_state
      unique_id: boys_room_bed_radar_state
      icon: mdi:bunk-bed
      state: >
        {% set presence = states('binary_sensor.mmwave_test_bed_ld2450_presence') %}
        {% set moving = states('binary_sensor.mmwave_test_bed_ld2410c_moving') %}
        {% set still = states('binary_sensor.mmwave_test_bed_ld2410c_still') %}
        {% set moving_energy = states('sensor.mmwave_test_bed_ld2410c_moving_energy') | float(0) %}
        {% set still_energy = states('sensor.mmwave_test_bed_ld2410c_still_energy') | float(0) %}
        {% set ns = namespace(x=none, y=none, speed=0) %}
        {% for t in [1, 2, 3] %}
          {% set tx = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_x') | float(none) %}
          {% set ty = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_y') | float(none) %}
          {% set ts = states('sensor.mmwave_test_bed_ld2450_t' ~ t ~ '_speed') | float(0) %}
          {% if tx is not none and ty is not none and ns.x is none %}
            {% set ns.x = tx %}
            {% set ns.y = ty %}
            {% set ns.speed = ts %}
          {% endif %}
        {% endfor %}
        {% if presence != 'on' or ns.x is none %}
          empty
        {% elif moving == 'on' or (ns.speed | abs) >= 80 or moving_energy > 10 %}
          active_or_messing
        {% elif ns.x > 0 and ns.y >= 2300 and ns.y <= 2900 %}
          jacob_top_likely
        {% elif ns.x <= -800 and ns.y >= 3000 %}
          joseph_bottom_likely
        {% elif ns.x >= -1100 and ns.x <= -700 and ns.y >= 2450 and ns.y <= 2750 and still == 'on' and still_energy >= 70 %}
          both_top_possible
        {% elif ns.x >= -1400 and ns.x <= -800 and ns.y >= 2550 and ns.y <= 2950 and still == 'on' %}
          both_separate_possible
        {% else %}
          uncertain
        {% endif %}
      attributes:
        target_count: "{{ states('sensor.mmwave_test_bed_ld2450_target_count') }}"
        ld2450_presence: "{{ states('binary_sensor.mmwave_test_bed_ld2450_presence') }}"
        t1_x: "{{ states('sensor.mmwave_test_bed_ld2450_t1_x') }}"
        t1_y: "{{ states('sensor.mmwave_test_bed_ld2450_t1_y') }}"
        t1_speed: "{{ states('sensor.mmwave_test_bed_ld2450_t1_speed') }}"
        ld2410c_presence: "{{ states('binary_sensor.mmwave_test_bed_ld2410c_presence') }}"
        ld2410c_moving: "{{ states('binary_sensor.mmwave_test_bed_ld2410c_moving') }}"
        ld2410c_still: "{{ states('binary_sensor.mmwave_test_bed_ld2410c_still') }}"
        ld2410c_moving_energy: "{{ states('sensor.mmwave_test_bed_ld2410c_moving_energy') }}"
        ld2410c_still_energy: "{{ states('sensor.mmwave_test_bed_ld2410c_still_energy') }}"
        calibration_note: "Experimental diagnostic only. Uses May 20 labelled bunk-bed samples; do not use for alerts yet."
