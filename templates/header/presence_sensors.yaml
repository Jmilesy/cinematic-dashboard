    ###############################################################
    # FAMILY SUMMARY
    ###############################################################
    - name: "Family Presence Summary"
      unique_id: family_presence_summary
      state: >
        {% set people = [
          ('Jon', 'person.jon', 'sensor.jon_room'),
          ('Natalie', 'person.natalie', 'sensor.natalie_room'),
          ('Jacob', 'person.jacob', 'sensor.jacob_room'),
          ('Joseph', 'person.joseph', 'sensor.joseph_room')
        ] %}
        {% set ns = namespace(present=[]) %}
        {% for name, entity, room in people %}
          {% if is_state(entity, 'home') %}
            {% set room_state = states(room) %}
            {% if room_state not in ['unknown', 'unavailable', 'Home'] %}
              {% set ns.present = ns.present + [name ~ ' in ' ~ room_state.replace('_', ' ')] %}
            {% else %}
              {% set ns.present = ns.present + [name ~ ' home'] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% if ns.present | length == 0 %}
          Nobody home
        {% else %}
          {{ ns.present | join(' • ') }}
        {% endif %}
      attributes:
        count_home: >
          {{ [
            states('person.jon'),
            states('person.natalie'),
            states('person.jacob'),
            states('person.joseph')
          ] | select('eq', 'home') | list | count }}
        count_away: >
          {{ 4 - ([
            states('person.jon'),
            states('person.natalie'),
            states('person.jacob'),
            states('person.joseph')
          ] | select('eq', 'home') | list | count) }}
        jon_home: "{{ is_state('person.jon', 'home') }}"
        natalie_home: "{{ is_state('person.natalie', 'home') }}"
        jacob_home: "{{ is_state('person.jacob', 'home') }}"
        joseph_home: "{{ is_state('person.joseph', 'home') }}"
        everyone_home: >
          {{ is_state('person.jon', 'home') and
             is_state('person.natalie', 'home') and
             is_state('person.jacob', 'home') and
             is_state('person.joseph', 'home') }}
        everyone_away: >
          {{ not is_state('person.jon', 'home') and
             not is_state('person.natalie', 'home') and
             not is_state('person.jacob', 'home') and
             not is_state('person.joseph', 'home') }}
        icon: >
          {% set count = [
            states('person.jon'),
            states('person.natalie'),
            states('person.jacob'),
            states('person.joseph')
          ] | select('eq', 'home') | list | count %}
          {% if count == 0 %}
            mdi:home-outline
          {% elif count == 4 %}
            mdi:home-account
          {% else %}
            mdi:home-circle
          {% endif %}
