###############################################################
# PRESENCE SENSORS
# Location: config/templates/presence_sensors.yaml
# Add to configuration.yaml:
#   template: !include_dir_merge_list templates/
###############################################################

- sensor:
    ###############################################################
    # ROOM SENSORS (Placeholders until mmWave deployed)
    ###############################################################
    - name: "Jon Room"
      unique_id: jon_room
      state: >
        {% if is_state('person.jon', 'home') %}
          Home
        {% else %}
          {{ states('person.jon') | title }}
        {% endif %}
      icon: mdi:home-account
    
    - name: "Natalie Room"
      unique_id: natalie_room
      state: >
        {% if is_state('person.natalie', 'home') %}
          Home
        {% else %}
          {{ states('person.natalie') | title }}
        {% endif %}
      icon: mdi:home-account
    
    - name: "Jacob Room"
      unique_id: jacob_room
      state: >
        {% if is_state('person.jacob', 'home') %}
