      icon: mdi:home-account
    
    - name: "Joseph Room"
      unique_id: joseph_room
      state: >
        {% if is_state('person.joseph', 'home') %}
          Home
        {% else %}
          {{ states('person.joseph') | title }}
        {% endif %}
      icon: mdi:home-account

    ###############################################################
    # INDIVIDUAL PERSON STATUS
    ###############################################################
    - name: "Jon Status"
      unique_id: jon_status
      state: >
        {% set state = states('person.jon') %}
        {% if state == 'home' %}
          {% set room = states('sensor.jon_room') %}
          {% if room not in ['unknown', 'unavailable', 'Home'] %}
            {{ room.replace('_', ' ') | title }}
          {% else %}
            Home
          {% endif %}
        {% else %}
          {{ state | title }}
        {% endif %}
      attributes:
        is_home: "{{ is_state('person.jon', 'home') }}"
        location: "{{ states('person.jon') }}"
        room: "{{ states('sensor.jon_room') }}"
        battery_level: "{{ states('sensor.jon_phone_battery_level') }}"
        battery_state: "{{ states('sensor.jon_phone_battery_state') }}"
        is_charging: "{{ is_state('sensor.jon_phone_battery_state', 'charging') or is_state('sensor.jon_phone_battery_state', 'full') }}"
        should_glow: >
          {{ is_state('person.jon', 'home') and
             (is_state('sensor.jon_phone_battery_state', 'charging') or is_state('sensor.jon_phone_battery_state', 'full')) }}
        battery_display: >
          {% set lvl = states('sensor.jon_phone_battery_level') | int(0) %}
          {% set chg = states('sensor.jon_phone_battery_state') %}
          {% if lvl == 0 or chg == 'unknown' %}
            Battery N/A
          {% elif chg == 'charging' %}
            {{ lvl }}% ⚡ (Charging)
          {% elif chg == 'full' %}
            {{ lvl }}% (Full)
          {% elif chg == 'not_charging' %}
            {{ lvl }}% (Not Charging)
          {% else %}
            {{ lvl }}%
          {% endif %}
        color: "#ffcc00"

