# ═══════════════════════════════════════════════════════════════
# 🌙 BEDTIME REMINDER (9:00 PM)
# ═══════════════════════════════════════════════════════════════
#
# Reminds boys it's bedtime
# Softer volume for evening
#
# Device: Boy's New Dot (their room)
# Time: 9:00 PM
# Days: Sunday-Thursday (school nights)
#
# ═══════════════════════════════════════════════════════════════

id: bedtime_reminder
alias: "Bedtime Reminder - School Nights"
description: "Remind boys to go to bed on school nights"
mode: single

triggers:
  - at: "21:00:00"
    trigger: time

conditions:
  - condition: time
    weekday:
      - sun
      - mon
      - tue
      - wed
      - thu

actions:
  - action: notify.alexa_media_boy_s_new_dot
    data:
      message: "Boys, it's bedtime. Please head to your room and get ready for bed."
      data:
        type: announce
        volume_level: 0.4  # Quiet for evening
