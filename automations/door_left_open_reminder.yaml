# ═══════════════════════════════════════════════════════════════
# 🚪 DOOR LEFT OPEN REMINDER
# ═══════════════════════════════════════════════════════════════
#
# Reminds if a door has been left open for 10 minutes
# Prevents heating/cooling loss
#
# Device: Lounge Plus
# Trigger: Door open for 10 minutes
# Days: Any day
#
# ═══════════════════════════════════════════════════════════════

alias: "Door Left Open Reminder"
description: "Alert if door left open too long"
mode: restart

triggers:
  # Add your door sensors here
  - trigger: state
    entity_id: 
      - binary_sensor.front_door
      - binary_sensor.back_door
      # Add more door sensors as needed
    to: "on"
    for:
      minutes: 10

conditions:
  # Only remind if someone is home
  - condition: state
    entity_id: group.family
    state: "home"

actions:
  - action: notify.alexa_media_lounge_plus
    data:
      message: >
        Reminder: The {{ trigger.to_state.attributes.friendly_name }} 
        has been open for 10 minutes. 
        Please close it to save energy.
      data:
        type: announce
