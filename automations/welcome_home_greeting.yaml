# ═══════════════════════════════════════════════════════════════
# 👋 WELCOME HOME GREETING
# ═══════════════════════════════════════════════════════════════
#
# Greets family members when they arrive home
# Personalized message per person
#
# Device: Lounge Plus
# Trigger: Person arrives home
# Days: Any day
#
# ═══════════════════════════════════════════════════════════════

alias: "Welcome Home Greeting"
description: "Greet family members when they arrive home"
mode: queued
max: 5

triggers:
  - trigger: state
    entity_id:
      - person.jon
      - person.natalie
      - person.jacob
      - person.joseph
    to: "home"
    from: "not_home"

conditions:
  # Only greet during reasonable hours
  - condition: time
    after: "07:00:00"
    before: "22:00:00"

actions:
  - action: notify.alexa_media_lounge_plus
    data:
      message: >
        Welcome home {{ trigger.to_state.attributes.friendly_name }}!
        {% if now().hour < 12 %}
          Good morning.
        {% elif now().hour < 18 %}
          Good afternoon.
        {% else %}
          Good evening.
        {% endif %}
      data:
        type: announce

  # Optional: Turn on welcome lights
  - action: light.turn_on
    target:
      entity_id: light.hall_light
    data:
      brightness: 255
      transition: 2
