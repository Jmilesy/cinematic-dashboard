# ═══════════════════════════════════════════════════════════════
# 🗑️ BIN DAY REMINDER (Evening Before)
# ═══════════════════════════════════════════════════════════════
#
# Reminds to put bins out the night before collection
#
# Device: Lounge Plus
# Time: 8:00 PM
# Days: Night before bin day (customize to your schedule)
#
# ═══════════════════════════════════════════════════════════════

id: bin_day_reminder
alias: "Bin Day Reminder"
description: "Remind to put bins out for collection"
mode: single

triggers:
  - at: "20:00:00"
    trigger: time

conditions:
  # Customize these days based on YOUR bin collection schedule
  # Example: Bins collected on Wednesday, so remind Tuesday evening
  - condition: time
    weekday:
      - tue  # Night before Wednesday collection
      # Add more days if you have multiple collection days

actions:
  - action: notify.alexa_media_lounge_plus
    data:
      message: >
        Reminder: Tomorrow is bin day. 
        Please put the bins out for collection.
      data:
        type: announce

  # Optional: Also notify parents' phones
  - action: notify.mobile_app_jon_phone
    data:
      title: "🗑️ Bin Day Tomorrow"
      message: "Don't forget to put the bins out!"
