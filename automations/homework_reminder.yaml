# ═══════════════════════════════════════════════════════════════
# 📚 HOMEWORK REMINDER (After School)
# ═══════════════════════════════════════════════════════════════
#
# Reminds boys to do homework after arriving home from school
#
# Device: Boy's New Dot
# Time: 4:30 PM (after school snack/wind down)
# Days: Monday-Friday (school days)
#
# ═══════════════════════════════════════════════════════════════

alias: "Homework Reminder"
description: "Remind boys to do homework after school"
mode: single

triggers:
  - at: "16:30:00"
    trigger: time  # 4:30 PM

conditions:
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
  
  - condition: state
    entity_id: input_boolean.school_day
    state: "on"
  
  # At least one boy is home
  - condition: or
    conditions:
      - condition: state
        entity_id: person.jacob
        state: "home"
      - condition: state
        entity_id: person.joseph
        state: "home"

actions:
  - action: notify.alexa_media_boy_s_new_dot
    data:
      message: >
        Boys, homework time! 
        Get your homework done before dinner.
      data:
        type: announce

  # Optional: Turn on their "project" lights (homework indicator)
  - action: switch.turn_on
    target:
      entity_id:
        - switch.jacob_project
        - switch.joseph_project
