# ═══════════════════════════════════════════════════════════════
# ⚽ FOOTBALL PRACTICE REMINDER
# ═══════════════════════════════════════════════════════════════
#
# Reminds about football practice on practice days
# Time to get kit ready!
#
# Device: Boy's New Dot
# Time: 3:30 PM (customize based on your schedule)
# Days: Practice days (customize)
#
# ═══════════════════════════════════════════════════════════════

alias: "Football Practice Reminder"
description: "Remind boys about football practice"
mode: single

triggers:
  - at: "16:00:00"
    trigger: time  # 3:30 PM - adjust to your practice time

conditions:
  # Customize these days based on YOUR practice schedule
  - condition: time
    weekday:
      - tue  # Example: Practice on Tuesdays
      - thu  # Example: Practice on Thursdays
  
  # Optional: Only if boys are home
  - condition: or
    conditions:
      - condition: state
        entity_id: person.jacob
        state: "home"
      - condition: state
        entity_id: person.joseph
        state: "home"

actions:
  - action: notify.alexa_media_everywhere
    data:
      message: >
        Boys! Football practice reminder.
        Make sure you have your:
        Kit,
        Boots,
        Water bottle,
        And shin pads ready!
      data:
        type: announce

  # Optional: Turn on their activity light
  - action: switch.turn_on
    target:
      entity_id: 
        - switch.jacob_club
        - switch.joseph_club
