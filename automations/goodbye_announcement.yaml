# ═══════════════════════════════════════════════════════════════
# 👋 GOODBYE ANNOUNCEMENT (Last Person Leaving)
# ═══════════════════════════════════════════════════════════════
#
# Announces when last person leaves home
# Reminder to lock up, turn off lights, etc.
#
# Device: All devices (so last person hears it)
# Trigger: Last person leaves
# Days: Any day
#
# ═══════════════════════════════════════════════════════════════

alias: "Goodbye - Last Person Leaving"
description: "Announcement when last person leaves home"
mode: single

triggers:
  - trigger: state
    entity_id: group.family
    to: "not_home"
    from: "home"

conditions:
  # Only during daytime
  - condition: time
    after: "06:00:00"
    before: "23:00:00"

actions:
  - action: notify.alexa_media
    data:
      message: >
        Goodbye! Don't forget to:
        Lock the doors,
        Turn off the lights,
        And set the alarm.
        Have a great day!
      data:
        type: announce
        method: all
      target:
        - media_player.lounge_plus
        - media_player.bedroom_dot

  # Optional: Turn off most lights automatically
  - action: light.turn_off
    target:
      entity_id: 
        - light.lounge
        - light.dining_room
        - light.kitchen
    data:
      transition: 5
