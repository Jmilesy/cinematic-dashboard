# ═══════════════════════════════════════════════════════════════
# 🍽️ DINNER TIME ANNOUNCEMENT (6:00 PM)
# ═══════════════════════════════════════════════════════════════
#
# Announces dinner is ready
# Broadcasts to all devices to gather family
#
# Device: All Alexa devices
# Time: 6:00 PM
# Days: Every day
#
# ═══════════════════════════════════════════════════════════════

alias: "Dinner Time Announcement"
description: "Call everyone for dinner"
mode: single

triggers:
  - at: "18:00:00"
    trigger: time

conditions:
  # Only announce if someone is home
  - condition: or
    conditions:
      - condition: state
        entity_id: person.jon
        state: "home"
      - condition: state
        entity_id: person.natalie
        state: "home"

actions:
  - action: notify.alexa_media
    data:
      message: "Dinner is ready! Everyone to the dining room please."
      data:
        type: announce
        method: all
      target:
        - media_player.lounge_plus
        - media_player.boy_s_new_dot
        - media_player.bedroom_dot
