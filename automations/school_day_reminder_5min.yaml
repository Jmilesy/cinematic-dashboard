# ═══════════════════════════════════════════════════════════════
# ⏰ SCHOOL 5-MINUTE WARNING (7:40 AM)
# ═══════════════════════════════════════════════════════════════
#
# Gives boys a 5-minute heads up before the main announcement
# Softer tone to ease them into waking
#
# Device: Boy's New Dot (their room)
# Time: 7:40 AM
# Days: Monday-Friday (when school_day is ON)
#
# ═══════════════════════════════════════════════════════════════

id: school_day_reminder_5min
alias: "School Day - 5 Minute Warning"
description: "Gentle reminder 5 minutes before school announcement"
mode: single

triggers:
  - at: "07:05:00"
    trigger: time

conditions:
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
  - condition: state
    entity_id: input_boolean.school_day
    state: "on"

actions:
  - data:
      data:
        type: tts
        volume_level: 0.8
      message: "Boys, time to get up please."
    action: notify.alexa_media_boy_s_new_dot
