# ═══════════════════════════════════════════════════════════════
# ☀️ MORNING GREETING (7:00 AM)
# ═══════════════════════════════════════════════════════════════
#
# Cheerful morning greeting to start the day
# Includes weather and temperature
#
# Device: Lounge Plus (family area)
# Time: 7:00 AM
# Days: Every day
#
# ═══════════════════════════════════════════════════════════════

id: morning_greeting
alias: "Morning Greeting"
description: "Good morning announcement with weather"
mode: single

triggers:
  - at: "07:00:00"
    trigger: time

actions:
  - action: notify.alexa_media_lounge_plus
    data:
      message: >
        Good morning everyone! 
        The time is {{ now().strftime('%I:%M %p') }}.
        It's {{ states('sensor.bedroom_temperature') | round(0) }} degrees inside.
        Have a great day!
      data:
        type: announce
