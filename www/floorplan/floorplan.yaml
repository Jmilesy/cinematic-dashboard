    state_action:
      action: call-service
      service: floorplan.text_set
      service_data:
        element: bathroom-light-status
        text: |
          >
          const value = Number(entity.state);
          if (!Number.isFinite(value)) return '-- lx';
          return value >= 20 ? `Bright ${Math.round(value)}lx` : `Dark ${Math.round(value)}lx`;
