          >
          const value = Number(entity.state);
          return Number.isFinite(value) ? `${Math.round(value)}%` : '--%';

  - name: Boys room light button
    entities:
      - entity: light.boys_light
        element: light-boys-btn
    tap_action:
      action: call-service
      service: light.toggle
      service_data:
        entity_id:
          - light.boys_light
          - light.boys_light_2
          - light.boys_led_light
    state_action:
      - state: "on"
        action: call-service
        service: floorplan.class_set
