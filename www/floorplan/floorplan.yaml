  - name: Boys room occupied status
    entities:
      - entity: binary_sensor.mmwave_test_bed_ld2450_presence
        element: boys-occupied-status
    state_action:
      - state: "on"
        action: call-service
        service: floorplan.text_set
        service_data:
          element: boys-occupied-status
