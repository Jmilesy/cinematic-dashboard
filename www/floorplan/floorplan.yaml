image: /local/floorplan/floorplan.svg?v=28
stylesheet: /local/floorplan/floorplan.css?v=7
log_level: warn

rules:

  - name: Boys room light overlay
    entities:
      - entity: light.boys_light
        element: room-boys-light
    state_action:
      - state: "on"
        action: call-service
        service: floorplan.class_set
        service_data:
          element: room-boys-light
          class: "room-overlay overlay-light-on"
      - state: "off"
        action: call-service
        service: floorplan.class_set
        service_data:
          element: room-boys-light
          class: "room-overlay overlay-off"

  - name: Boys room presence overlay
