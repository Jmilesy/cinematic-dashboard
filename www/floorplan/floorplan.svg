<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1336 552">
  <defs>
    <style>
      .room { fill: transparent; }
      .target { display: none; }
      .target-active { display: block; }
      .info-bg { fill: rgba(0,0,0,0.55); rx: 6; }
      .info-text { font-size: 13px; font-family: Arial, sans-serif; fill: white; }
      .info-text-sm { font-size: 11px; font-family: Arial, sans-serif; fill: #ccc; }
      .light-btn { cursor: pointer; }
      .light-off { fill: rgba(80,80,80,0.8); }
      .light-on  { fill: rgba(255,200,50,0.9); }
    </style>
  </defs>

  <!-- Background PNG -->
  <image href="/local/floorplan/firstfloor.png" x="0" y="0" width="1336" height="552"/>

  <!-- Room hit areas -->
  <rect id="room-bathroom" class="room" x="898.2" y="8.3" width="402.8" height="260.5"/>
  <path id="room-landing" class="room" d="M891.3,97.4h-320.8l-63.9,63.9v109.2h116.6v-86.7h268.1v-86.4h0Z"/>
  <path id="room-boys"    class="room" d="M513.6,266.7v279.3h384.7V180h-268.1v86.7h-116.6Z"/>
  <path id="room-bedroom" class="room" d="M513.6,157.5H122.9v84.6h-60l-50.9,50.9v146l44.1,44.1h54.8v62.8h291.8v-233.5h110.9v-155h0Z"/>

  <!-- Independent state overlays. These sit above the plan but ignore pointer events. -->
  <rect id="room-bathroom-presence" class="room-overlay" x="898.2" y="8.3" width="402.8" height="260.5"/>
  <path id="room-landing-light" class="room-overlay" d="M891.3,97.4h-320.8l-63.9,63.9v109.2h116.6v-86.7h268.1v-86.4h0Z"/>
  <path id="room-landing-presence" class="room-overlay" d="M891.3,97.4h-320.8l-63.9,63.9v109.2h116.6v-86.7h268.1v-86.4h0Z"/>
  <path id="room-boys-light" class="room-overlay" d="M513.6,266.7v279.3h384.7V180h-268.1v86.7h-116.6Z"/>
  <path id="room-boys-presence" class="room-overlay" d="M513.6,266.7v279.3h384.7V180h-268.1v86.7h-116.6Z"/>
  <path id="room-bedroom-light" class="room-overlay" d="M513.6,157.5H122.9v84.6h-60l-50.9,50.9v146l44.1,44.1h54.8v62.8h291.8v-233.5h110.9v-155h0Z"/>

  <!-- ═══ BEDROOM info panel ═══ -->
  <rect x="128" y="462" width="105" height="52" rx="6" class="info-bg"/>
  <text x="138" y="479" class="info-text-sm">&#127777; Temp</text>
  <text id="bedroom-temp" x="138" y="496" class="info-text">--°C</text>
  <text x="138" y="508" class="info-text-sm">&#128167; <tspan id="bedroom-hum">--%</tspan></text>

  <!-- Bedroom light button -->
  <g id="light-bedroom" class="light-btn">
    <circle cx="400" cy="340" r="18" class="light-off" stroke="white" stroke-width="1.5"/>
    <text x="391" y="346" font-size="18" fill="white" pointer-events="none">&#128161;</text>
  </g>

  <!-- ═══ BOYS ROOM info panel ═══ -->
  <rect x="522" y="462" width="105" height="52" rx="6" class="info-bg"/>
  <text x="532" y="479" class="info-text-sm">&#127777; Temp</text>
  <text id="boysroom-temp" x="532" y="496" class="info-text">--°C</text>
  <text x="532" y="508" class="info-text-sm">&#128494; <tspan id="boys-occupied-status">Clear</tspan></text>

  <!-- Boys room light button -->
  <g id="light-boys-btn" class="light-btn">
    <circle cx="820" cy="420" r="18" class="light-off" stroke="white" stroke-width="1.5"/>
    <text x="811" y="426" font-size="18" fill="white" pointer-events="none">&#128161;</text>
  </g>

  <!-- ═══ LANDING info panel ═══ -->
  <rect x="638" y="215" width="105" height="52" rx="6" class="info-bg"/>
  <text x="648" y="232" class="info-text-sm">&#127777; Temp</text>
  <text id="landing-temp" x="648" y="249" class="info-text">--°C</text>
  <text x="648" y="261" class="info-text-sm">&#128167; <tspan id="landing-hum">--%</tspan></text>
  <g id="landing-occupancy-pill">
    <rect id="landing-occupancy-bg" x="758" y="215" width="82" height="24" rx="6" class="status-pill"/>
    <text id="landing-occupied-status" x="768" y="231" class="status-text">Hall clear</text>
  </g>

  <!-- Landing light button -->
  <g id="light-landing-btn" class="light-btn">
    <circle cx="855" cy="145" r="18" class="light-off" stroke="white" stroke-width="1.5"/>
    <text x="846" y="151" font-size="18" fill="white" pointer-events="none">&#128161;</text>
  </g>

  <!-- ═══ BATHROOM info panel ═══ -->
  <rect x="910" y="202" width="112" height="58" rx="6" class="info-bg"/>
  <text x="920" y="219" class="info-text-sm">&#128703; Bathroom</text>
  <text x="920" y="236" class="info-text">&#127777; <tspan id="bathroom-temp">--°C</tspan></text>
  <text x="920" y="252" class="info-text-sm">&#128167; <tspan id="bathroom-hum">--%</tspan></text>
  <g id="bathroom-occupancy-pill">
    <rect id="bathroom-occupancy-bg" x="1030" y="202" width="76" height="24" rx="6" class="status-pill"/>
    <text id="bathroom-occupied-status" x="1040" y="218" class="status-text">Clear</text>
  </g>

  <!-- Door and light status badges -->
  <g id="front-door-pill">
    <rect id="front-door-bg" x="42" y="318" width="94" height="24" rx="6" class="status-pill"/>
    <text id="front-door-status" x="52" y="334" class="status-text">Front closed</text>
  </g>
  <g id="boys-door-pill">
    <rect id="boys-door-bg" x="632" y="262" width="90" height="24" rx="6" class="status-pill"/>
    <text id="boys-door-status" x="642" y="278" class="status-text">Door closed</text>
  </g>
  <g id="light-status-pill">
    <rect id="boys-light-bg" x="782" y="390" width="74" height="22" rx="6" class="status-pill"/>
    <text id="boys-light-status" x="792" y="405" class="status-text">Light off</text>
    <rect id="hall-light-bg" x="846" y="112" width="72" height="22" rx="6" class="status-pill"/>
    <text id="hall-light-status" x="856" y="127" class="status-text">Hall off</text>
    <rect id="bathroom-light-bg" x="1030" y="232" width="78" height="22" rx="6" class="status-pill"/>
    <text id="bathroom-light-status" x="1040" y="247" class="status-text">-- lx</text>
  </g>

  <!-- LD2450 target dots — default cx=-100 keeps them off-screen until ha-floorplan positions them -->
  <circle id="target-1" cx="-100" cy="363" r="9" fill="#ff4444" stroke="white" stroke-width="2" opacity="0.9"/>
  <circle id="target-2" cx="-100" cy="363" r="9" fill="#ff00ff" stroke="white" stroke-width="2" opacity="0.9"/>
  <circle id="target-3" cx="-100" cy="363" r="9" fill="#ffcc00" stroke="white" stroke-width="2" opacity="0.9"/>
</svg>
