# ============================================================
# BOYS MORNING SUNRISE - Migrated from Node-RED
# ============================================================
- id: boys_morning_sunrise
  alias: Boys Morning - Sunrise Light
  description: Gradual red to white transition 15 mins before Boy's Dot alarm on school days
  mode: single
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions:
  - condition: template
    value_template: >
      {% set alarm = states('sensor.boy_s_new_dot_next_alarm') %}
      {% if alarm not in ['unknown', 'unavailable'] %}
        {% set alarm_dt = alarm | as_datetime | as_local %}
        {% set sunrise_dt = alarm_dt - timedelta(minutes=15) %}
        {{ now().strftime('%H:%M') == sunrise_dt.strftime('%H:%M') }}
      {% else %}
        false
      {% endif %}
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
  - condition: state
    entity_id: input_boolean.school_day
    state: 'on'
  - condition: state
    entity_id: input_boolean.boys_bedtime
    state: 'on'
  actions:
  - repeat:
      count: 60
      sequence:
      - action: light.turn_on
        target:
          entity_id:
            - light.boys_light
            - light.joseph
        data:
          transition: 5
          rgb_color: >
            {% set progress = repeat.index / 60 %}
            {% if progress < 0.5 %}
              {% set t = progress * 2 %}
              {{ [255, (200 * t) | int, 0] }}
            {% else %}
              {% set t = (progress - 0.5) * 2 %}
              {{ [255, (200 + 55 * t) | int, (100 * t) | int] }}
            {% endif %}
          brightness: >
            {{ (2.55 + (252.45 * (repeat.index / 60))) | int }}
      - delay:
          seconds: 5

