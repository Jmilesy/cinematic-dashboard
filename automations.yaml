    target:
      entity_id: input_boolean.alert_active
  # Short buzz on mon_buzzer (0.5 seconds)
  - action: switch.turn_on
    target:
      entity_id: switch.mon_buzzer
  - delay:
      milliseconds: 500
  - action: switch.turn_off
    target:
      entity_id: switch.mon_buzzer
  # Wigwag bins/recycling and flash boys_info while door is open (up to 30 seconds)
  - alias: Wigwag and flash while door is open
    repeat:
      while:
        - condition: state
          entity_id: 9bdf92f12f090b5cb937ec8615d3e22b
          state: "on"
        - condition: template
          value_template: "{{ repeat.index <= 15 }}"
      sequence:
        - action: light.turn_on
          target:
            entity_id: light.boys_info
        - action: switch.turn_on
          target:
            entity_id: switch.bins
        - action: switch.turn_off
          target:
            entity_id: switch.recycling
        - delay:
            seconds: 1
        - action: light.turn_off
          target:
            entity_id: light.boys_info
        - action: switch.turn_off
          target:
            entity_id: switch.bins
        - action: switch.turn_on
          target:
            entity_id: switch.recycling
        - delay:
            seconds: 1
  # Stop wigwag — turn everything off
  - action: switch.turn_off
    target:
      entity_id:
        - switch.bins
        - switch.recycling
  - action: light.turn_off
    target:
      entity_id: light.boys_info
  # If the door is still open after 30 seconds, announce
  - condition: state
    entity_id: 9bdf92f12f090b5cb937ec8615d3e22b
    state: "on"
  - action: notify.alexa_media_kitchen_dot
    metadata: {}
    data:
      message: The Fridge door is open
  mode: restart
- id: '1772810384558'
  alias: Washing Machine Status Indicator
  description: Change light color based on washing machine state
  triggers:
  - entity_id: sensor.wash_cycle_status
