- id: school_day_manager
  alias: School Day Manager
  description: 'At midnight: get today''s events from calendar.sandown_school_calendar.
    Weekend, or any event containing ''holiday'', ''inset'', or ''bank'' -> school
    day OFF. Otherwise (no events or other special events) -> school day ON. '
  mode: single
  triggers:
  - trigger: time
    at: 00:01:00
  actions:
  - action: calendar.get_events
    target:
      entity_id: calendar.sandown_school_calendar
    data:
      start_date_time: '{{ now().strftime(''%Y-%m-%d'') }} 00:00:00'
      end_date_time: '{{ now().strftime(''%Y-%m-%d'') }} 23:59:59'
    response_variable: todays_events
  - if:
    - condition: template
      value_template: "{{ now().weekday() >= 5 or\n   todays_events['calendar.sandown_school_calendar']['events']\
        \ |\n   selectattr('summary', 'search', 'holiday|inset|bank holiday', ignorecase=True)\
        \ |\n   list | count > 0 }}\n"
    then:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.school_day
    - action: input_text.set_value
      target:
        entity_id: input_text.boys_school
      data:
        value: "{%- set off_event = todays_events['calendar.sandown_school_calendar']['events']\
          \ |\n   selectattr('summary', 'search', 'holiday|inset|bank holiday', ignorecase=True)\
          \ |\n   map(attribute='summary') | first | default('') -%}\n{% if off_event\
          \ %}{{ off_event }}{% else %}Enjoy your day off{% endif %}\n"
    else:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.school_day
    - action: input_text.set_value
      target:
        entity_id: input_text.boys_school
      data:
        value: "{%- set events = todays_events['calendar.sandown_school_calendar']['events']\
          \ |\n   map(attribute='summary') | list -%}\n{% if events %}{{ events |\
          \ join(', ') }}{% else %}School day{% endif %}\n"
- id: jacob_timetable_rotary_text
  alias: Jacob Timetable Rotary Text
  description: Updates plain text helpers for the rotary controller LCD.
  mode: single
  triggers:
  - trigger: time
    at: 00:05:00
  - trigger: homeassistant
    event: start
  actions:
  - action: calendar.get_events
    target:
      entity_id: calendar.jacob_timetable
    data:
      start_date_time: '{{ now().strftime(''%Y-%m-%d'') }} 00:00:00'
      end_date_time: '{{ now().strftime(''%Y-%m-%d'') }} 23:59:59'
    response_variable: jacob_today
  - action: calendar.get_events
    target:
      entity_id: calendar.jacob_timetable
    data:
      start_date_time: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d'') }} 00:00:00'
      end_date_time: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d'') }} 23:59:59'
    response_variable: jacob_tomorrow
  - action: input_text.set_value
    target:
      entity_id: input_text.jacob_timetable_today
    data:
      value: '{%- set events = jacob_today[''calendar.jacob_timetable''][''events'']
        | map(attribute=''summary'') | list -%}

        {%- if events -%}{{ events | join('', '') | truncate(255, true, '''') }}{%-
        else -%}No lessons today{%- endif -%}'
  - action: input_text.set_value
    target:
      entity_id: input_text.jacob_timetable_tomorrow
    data:
      value: '{%- set events = jacob_tomorrow[''calendar.jacob_timetable''][''events'']
        | map(attribute=''summary'') | list -%}

        {%- if events -%}{{ events | join('', '') | truncate(255, true, '''') }}{%-
        else -%}No lessons tomorrow{%- endif -%}'
- id: valance_morning_sunrise
  alias: Valance Morning Sunrise
  description: 'Triggers WLED nightlight sunrise on valance at 06:15 Mon-Fri. 10 minute
    fade from off to full brightness. No school_day gate (Natalie''s wake-up). '
  mode: single
  triggers:
  - trigger: time
    at: 06:15:00
  conditions:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - action: rest_command.valance_sunrise
- id: rotary_encoder_controller
  alias: Rotary Encoder Controller
  description: Handles ESPHome rotary encoder UI navigation events.
  mode: queued
  max: 5
  triggers:
  - trigger: event
    event_type: esphome.encoder_event
  conditions:
  - condition: template
    value_template: '{{ trigger.event.data.action in [''left'', ''right'', ''press'',
      ''long_press''] }}'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''left'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_select.rotary_ui_state
            state: menu
          sequence:
          - action: script.rotary_ui_menu_previous
        - conditions:
          - condition: template
            value_template: '{{ states(''input_select.rotary_ui_state'') in [''page_school'',
              ''page_jacob''] }}'
          sequence:
          - action: script.rotary_ui_page_previous
        default:
        - condition: template
          value_template: '{{ not is_state(''input_select.rotary_ui_state'', ''front'')
            }}'
        - action: script.rotary_ui_touch
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''right'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_select.rotary_ui_state
            state: menu
          sequence:
          - action: script.rotary_ui_menu_next
        - conditions:
          - condition: template
            value_template: '{{ states(''input_select.rotary_ui_state'') in [''page_school'',
              ''page_jacob''] }}'
          sequence:
          - action: script.rotary_ui_page_next
        default:
        - condition: template
          value_template: '{{ not is_state(''input_select.rotary_ui_state'', ''front'')
            }}'
        - action: script.rotary_ui_touch
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''press'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_select.rotary_ui_state
            state: front
          sequence:
          - action: script.rotary_ui_open_menu
        - conditions:
          - condition: state
            entity_id: input_select.rotary_ui_state
            state: menu
          sequence:
          - action: script.rotary_ui_open_selected_page
        default:
        - action: script.rotary_ui_page_press
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''long_press'' }}'
      sequence:
      - action: script.rotary_ui_return_front
- id: rotary_ui_timeout_return_front
  alias: Rotary UI Timeout Return Front
  description: Returns the rotary controller UI to the front screen after inactivity.
  mode: single
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.rotary_ui_timeout
  conditions: []
  actions:
  - action: script.rotary_ui_return_front
- id: octoprint_print_done
  alias: OctoPrint - Print Complete Announcement
  description: Announce on alarm Alexa when print finishes. Silent 8pm-7am.
  mode: single
  triggers:
  - trigger: state
    entity_id: binary_sensor.octoprint_printing
    from: 'on'
    to: 'off'
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.to_state is not
      none and trigger.from_state.state == ''on'' and trigger.to_state.state == ''off''
      }}'
  - condition: state
    entity_id: binary_sensor.octoprint_printing_error
    state: 'off'
  - condition: time
    after: 07:00:00
    before: '20:00:00'
  actions:
  - action: notify.alexa_media_alarm
    data:
      message: Your 3D print has finished.
      data:
        type: announce
        method: speak
- id: octoprint_print_failed
  alias: OctoPrint - Print Failed Announcement
  description: Announce on alarm Alexa when print errors. Silent 8pm-7am.
  mode: single
  triggers:
  - trigger: state
    entity_id: binary_sensor.octoprint_printing_error
    from: 'off'
    to: 'on'
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.to_state is not
      none and trigger.from_state.state == ''off'' and trigger.to_state.state == ''on''
      }}'
  - condition: time
    after: 07:00:00
    before: '20:00:00'
  actions:
  - action: notify.alexa_media_alarm
    data:
      message: Warning! Your 3D print has failed. Please check OctoPrint.
      data:
        type: announce
        method: speak
