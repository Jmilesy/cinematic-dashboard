          rgb_color:
          - 0
          - 210
          - 213
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Last rinse
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 255
          - 127
          - 0
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Spin
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 175
          - 141
          - 0
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Steam
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
