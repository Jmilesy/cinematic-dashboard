- id: '1771001543004'
  alias: weather with 4-tier UK backup services
  description: Weather announcement with 4-tier UK backup services
  triggers:
  - trigger: time
    at: 07:20:00
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  conditions: []
  actions:
  - action: weather.get_forecasts
    metadata: {}
    target:
      entity_id: "{% if has_value('weather.met_office_deal') %}\n  weather.met_office_deal\n{%
        elif has_value('weather.home_weather') %}\n  weather.home_weather\n{% elif
        has_value('weather.forecast_home') %}\n  weather.forecast_home\n{% else %}\n
        \ weather.pirateweather\n{% endif %}\n"
    data:
      type: daily
    response_variable: daily_forecast
  - action: conversation.process
    metadata: {}
    data:
      text: 'You are an advanced smart home with a built in personal weather station.
        Weather updates will be spoken out loud and should be funny and creative because
        two children 11 years old and 14 years old will be listening. Please use whole
        numbers and try to make it educational! This should be less than 30 seconds
        in length. it is important that the school update comes first

        {% if states(''sensor.school_event_today'') %} School Update: {{ states(''sensor.school_event_today'')
        }} {% endif %}

        Current Conditions: Current time is {{ now().strftime(''%I:%M %p'') }}.

        Temperature is {% if has_value(''sensor.met_office_deal_temperature'') %}{{
        states(''sensor.met_office_deal_temperature'') | round(0) }}°C{% elif has_value(''weather.home_weather'')
        %}{{ state_attr(''weather.home_weather'', ''temperature'') | round(0) }}°C{%
        elif has_value(''weather.forecast_home'') %}{{ state_attr(''weather.forecast_home'',
        ''temperature'') | round(0) }}°C{% else %}{{ states(''sensor.pirateweather_temperature'')
        | round(0) }}°C{% endif %}.

        Feels like {% if has_value(''sensor.pirateweather_apparent_temperature'')
        %}{{ states(''sensor.pirateweather_apparent_temperature'') | round(0) }}°C{%
        elif has_value(''sensor.met_office_deal_feels_like_temperature'') %}{{ states(''sensor.met_office_deal_feels_like_temperature'')
        | round(0) }}°C{% elif has_value(''weather.forecast_home'') %}{{ state_attr(''weather.forecast_home'',
        ''dew_point'') | round(0) }}°C{% else %}the same{% endif %}.

        Humidity is {% if has_value(''weather.pirateweather'') %}{{ state_attr(''weather.pirateweather'',
        ''humidity'') | round(0) }}%{% elif has_value(''weather.met_office_deal'')
        %}{{ state_attr(''weather.met_office_deal'', ''humidity'') | round(0) }}%{%
        elif has_value(''weather.home_weather'') %}{{ state_attr(''weather.home_weather'',
        ''humidity'') | round(0) }}%{% elif has_value(''weather.forecast_home'') %}{{
        state_attr(''weather.forecast_home'', ''humidity'') | round(0) }}%{% endif
        %}.

        {% if has_value(''sensor.pirateweather_uv_index'') %}UV Index is {{ states(''sensor.pirateweather_uv_index'')
        | round(0) }}.{% elif has_value(''weather.forecast_home'') %}UV Index is {{
        state_attr(''weather.forecast_home'', ''uv_index'') | round(1) }}.{% endif
        %}

        Current conditions: {% if has_value(''weather.met_office_deal'') %}{{ states(''weather.met_office_deal'')
        }}{% elif has_value(''weather.home_weather'') %}{{ states(''weather.home_weather'')
        }}{% elif has_value(''weather.forecast_home'') %}{{ states(''weather.forecast_home'')
        }}{% else %}{{ states(''weather.pirateweather'') }}{% endif %}.

        Today''s Forecast: {% if has_value(''sensor.pirateweather_hourly_summary'')
        %}Forecasted Conditions for Today {{ states(''sensor.pirateweather_hourly_summary'')
        }}{% endif %}

        {% set forecast_entity = ''weather.met_office_deal'' if has_value(''weather.met_office_deal'')
        else ''weather.home_weather'' if has_value(''weather.home_weather'') else
        ''weather.forecast_home'' if has_value(''weather.forecast_home'') else ''weather.pirateweather''
        %}

        Temperature for Today {{ daily_forecast[forecast_entity].forecast[0].temperature
        }}

        Forecasted Low Temperature for Today {{ daily_forecast[forecast_entity].forecast[0].templow
        }}

        Forecasted Precipitation Probability {{ daily_forecast[forecast_entity].forecast[0].precipitation_probability
        }}

        {% set pollen_level = state_attr(''weather.silam_pollen_home_forecast'', ''next_condition'')
        %}{% set pollen_culprit = state_attr(''weather.silam_pollen_home_forecast'',
        ''responsible_elevated'') %}{% if pollen_level in [''medium'', ''high'', ''very_high'']
        %}Pollen Alert: {{ pollen_level }} levels today, mainly {{ pollen_culprit }}.{%
        endif %}

        '
      agent_id: conversation.kids_weather
    response_variable: agent
  - action: notify.alexa_media
    data:
      message: '{{ agent.response.speech.plain.speech }}'
      data:
        type: announce
        method: all
        volume_level: 0.5
      target:
      - media_player.lounge_plus
      - media_player.boy_s_new_dot
      - media_player.bedroom_dot
      - media_player.kitchen_dot
  - action: notify.mobile_app_jon_phone
    metadata: {}
    data:
      message: '{{ agent.response.speech.plain.speech }}'
  mode: single
- id: jacob_school_evening_prep
  alias: Jacob school evening prep
  description: Evening school prep with AI announcement, PE detection, and actionable
    notifications
  triggers:
  - trigger: time
    at: '19:00:00'
  conditions:
  - condition: time
    weekday:
    - sun
    - mon
    - tue
    - wed
    - thu
  - condition: state
    entity_id: input_boolean.school_day
    state: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.jacob_drink_confirmed
      - input_boolean.jacob_pe_kit_confirmed
      - input_boolean.jacob_pe_tomorrow
  - action: calendar.get_events
    target:
      entity_id: calendar.boys_school
    data:
      start_date_time: '{{ (now().date() + timedelta(days=1)).strftime(''%Y-%m-%d'')
        }} 00:00:00'
      end_date_time: '{{ (now().date() + timedelta(days=1)).strftime(''%Y-%m-%d'')
        }} 23:59:59'
    response_variable: school_events
  - if:
    - condition: template
      value_template: "{{ school_events['calendar.boys_school']['events'] |\n   selectattr('summary',
        'search', 'PE', ignorecase=True) |\n   list | count > 0 }}\n"
    then:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.jacob_pe_tomorrow
  - action: conversation.process
    data:
      agent_id: conversation.evening_prep
      text: 'Write a short evening school prep announcement for both boys.

        School is tomorrow. They need bags packed, homework done.

        Jacob needs a drink bottle in the fridge.

        {% if is_state(''input_boolean.jacob_pe_tomorrow'', ''on'') %}

        Jacob also has PE tomorrow and needs his PE kit ready.

        {% endif %}

        {% if states(''sensor.school_event_tomorrow'') not in [''unknown'', ''unavailable'',
        ''''] %}

        There is a school event tomorrow: {{ states(''sensor.school_event_tomorrow'')
        }}.

        {% endif %}

        Style: chaotic dad humour, dry sarcasm, short punchy sentences.

        No emojis. No baby talk. Address both boys directly.

        '
    response_variable: agent_response
  - action: notify.alexa_media
    data:
      message: '{{ agent_response.response.speech.plain.speech }}'
      target:
      - media_player.lounge_plus
      - media_player.boy_s_new_dot
      - media_player.bedroom_dot
      - media_player.kitchen_dot
      data:
        type: announce
        volume: 0.5
        method: all
  - action: notify.jacob_notify
    data:
      title: School Prep
      message: '{{ agent_response.response.speech.plain.speech }}'
  - action: notify.jacob_notify
    data:
      title: Drink bottles
      message: Jacob. How many drink bottles have you got in the fridge for tomorrow?
      data:
        actions:
        - action: JACOB_DRINK_ONE
          title: 1 bottle
        - action: JACOB_DRINK_TWO
          title: 2 bottles
        - action: JACOB_DRINK_NONE
          title: None yet
  - if:
    - condition: state
      entity_id: input_boolean.jacob_pe_tomorrow
      state: 'on'
    then:
    - action: notify.jacob_notify
      data:
        title: PE kit
        message: Jacob. PE tomorrow. Is your kit sorted and ready to go?
        data:
          actions:
          - action: JACOB_PE_DONE
            title: Yes sorted
          - action: JACOB_PE_NOT_YET
            title: Not yet
  mode: single
- id: jacob_task_nagger
  alias: Jacob task nagger
  description: Reminds Jacob every 30 mins if tasks are still unconfirmed
  mode: single
  triggers:
  - trigger: time
    at:
    - '19:30:00'
    - '20:00:00'
    - '20:30:00'
    - '21:00:00'
  conditions:
  - condition: time
    weekday:
    - sun
    - mon
    - tue
    - wed
    - thu
  - condition: state
    entity_id: input_boolean.school_day
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.jacob_drink_confirmed
      state: 'off'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.jacob_pe_tomorrow
        state: 'on'
      - condition: state
        entity_id: input_boolean.jacob_pe_kit_confirmed
        state: 'off'
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.jacob_drink_confirmed
      state: 'off'
    then:
    - action: notify.jacob_notify
      data:
        title: Still waiting...
        message: 'Jacob. The drink bottle. Still no answer.

          Fridge. Bottle. How many. Simple question.

          '
        data:
          actions:
          - action: JACOB_DRINK_ONE
            title: 1 bottle
          - action: JACOB_DRINK_TWO
            title: 2 bottles
          - action: JACOB_DRINK_NONE
            title: None yet
  - if:
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.jacob_pe_tomorrow
        state: 'on'
      - condition: state
        entity_id: input_boolean.jacob_pe_kit_confirmed
        state: 'off'
    then:
    - action: notify.jacob_notify
      data:
        title: PE kit. Again.
        message: 'Jacob. PE tomorrow. Your kit. Still no confirmation.

          Is it ready or not. Yes or no. That''s it.

          '
        data:
          actions:
          - action: JACOB_PE_DONE
            title: Yes sorted
          - action: JACOB_PE_NOT_YET
            title: Not yet
- id: jacob_drink_bottle_confirmed
  alias: Jacob drink bottle confirmed
