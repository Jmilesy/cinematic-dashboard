- id: '1772643456996'
  alias: Fridge Door
  description: Flash light, wigwag bins/recycling and buzz when fridge opens. Announce
    if open for 30s.
  triggers:
  - type: opened
    device_id: 8a1d964ca02d98160fcc83f805e93259
    entity_id: binary_sensor.fridge_door
    domain: binary_sensor
    trigger: device
  conditions: []
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.alert_active
  - action: switch.turn_on
    target:
      entity_id: switch.mon_buzzer
  - delay:
      milliseconds: 500
  - action: switch.turn_off
    target:
      entity_id: switch.mon_buzzer
  - alias: Wigwag and flash while door is open
    repeat:
      while:
      - condition: state
        entity_id: binary_sensor.fridge_door
        state: 'on'
      - condition: template
        value_template: '{{ repeat.index <= 15 }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.boys_info
      - action: switch.turn_on
        target:
          entity_id: switch.bins
      - action: switch.turn_off
        target:
          entity_id: switch.recycling
      - delay:
          seconds: 1
      - action: light.turn_off
        target:
          entity_id: light.boys_info
      - action: switch.turn_off
        target:
          entity_id: switch.bins
      - action: switch.turn_on
        target:
          entity_id: switch.recycling
      - delay:
          seconds: 1
  - action: switch.turn_off
    target:
      entity_id:
      - switch.bins
      - switch.recycling
  - action: light.turn_off
    target:
      entity_id: light.boys_info
  - condition: state
    entity_id: binary_sensor.fridge_door
    state: 'on'
  - action: notify.alexa_media_kitchen_dot
    metadata: {}
    data:
      message: The Fridge door is open
  mode: restart
- id: '1772810384558'
  alias: Washing Machine Status Indicator
  description: Change light color based on washing machine state
  triggers:
  - entity_id: sensor.wash_cycle_status
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.to_state is not
      none and trigger.from_state.state not in [''unavailable'', ''unknown''] and
      trigger.to_state.state not in [''unavailable'', ''unknown''] }}'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Stopped
      sequence:
      - delay:
          minutes: 3
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Stopped
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 255
          - 0
          - 0
          effect: pulse
        action: light.turn_on
      - target:
          entity_id: switch.mon_buzzer
        action: switch.turn_on
      - delay: 2
      - target:
          entity_id: switch.mon_buzzer
        action: switch.turn_off
      - data:
          message: Hey beautiful, The washing machine is finished
          data:
            type: announce
            method: speak
        action: notify.alexa_media_lounge_plus
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Wash
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 152
          - 78
          - 163
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Rinse
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 0
          - 210
          - 213
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Last rinse
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 255
          - 127
          - 0
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Spin
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 175
          - 141
          - 0
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: Steam
      sequence:
      - target:
          entity_id: light.washing
        data:
          brightness: 255
          rgb_color:
          - 127
          - 128
          - 205
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: sensor.wash_cycle_status
        state: unavailable
      sequence:
      - target:
          entity_id: light.washing
        action: light.turn_off
  mode: restart
