- id: boys_morning_sunrise
  alias: Boys Morning - Sunrise Light
  description: Gradual red to white transition 15 mins before Boy's Dot alarm on school
    days
  mode: single
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions:
  - condition: template
    value_template: "{% set alarm = states('sensor.boy_s_new_dot_next_alarm') %} {%\
      \ if alarm not in ['unknown', 'unavailable'] %}\n  {% set alarm_dt = alarm |\
      \ as_datetime | as_local %}\n  {% set sunrise_dt = alarm_dt - timedelta(minutes=15)\
      \ %}\n  {{ now().strftime('%H:%M') == sunrise_dt.strftime('%H:%M') }}\n{% else\
      \ %}\n  false\n{% endif %}\n"
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  - condition: state
    entity_id: input_boolean.school_day
    state: 'on'
  - condition: state
    entity_id: input_boolean.boys_bedtime
    state: 'on'
  actions:
  - repeat:
      count: 60
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.boys_light
          - light.joseph
        data:
          transition: 5
          rgb_color: "{% set progress = repeat.index / 60 %} {% if progress < 0.5\
            \ %}\n  {% set t = progress * 2 %}\n  {{ [255, (200 * t) | int, 0] }}\n\
            {% else %}\n  {% set t = (progress - 0.5) * 2 %}\n  {{ [255, (200 + 55\
            \ * t) | int, (100 * t) | int] }}\n{% endif %}\n"
          brightness: '{{ (2.55 + (252.45 * (repeat.index / 60))) | int }} '
      - delay:
          seconds: 5
- id: pir_hall_motion_on
  alias: PIR - Hall Motion Detected
  description: Turns on hall light and landing switch on motion. Blue at bedtime,
    white during day.
  triggers:
  - trigger: state
    entity_id: binary_sensor.hall_multi_sensor
    to: 'on'
  - trigger: state
    entity_id: binary_sensor.hall_pir
    to: 'on'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.boys_bedtime
        state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.hall_light
        data:
          color_name: blue
          brightness_pct: 75
    default:
    - action: light.turn_on
      target:
        entity_id: light.hall_light
      data:
        brightness_pct: 100
        color_temp_kelvin: 6535
  - action: switch.turn_on
    data: {}
    target:
      entity_id: switch.hall_wall
  - wait_for_trigger:
    - trigger: state
      entity_id: binary_sensor.hall_multi_sensor
      to: 'off'
    - trigger: state
      entity_id: binary_sensor.hall_pir
      to: 'off'
    timeout:
      minutes: 15
    continue_on_timeout: true
  - delay:
      seconds: '{{ 30 if is_state(''input_boolean.boys_bedtime'', ''on'') else 45
        }}'
  - condition: template
    value_template: '{{ is_state(''binary_sensor.hall_multi_sensor'', ''off'') and
      is_state(''binary_sensor.hall_pir'', ''off'') }}'
  - action: light.turn_off
    target:
      entity_id: light.hall_light
  - action: switch.turn_off
    data: {}
    target:
      entity_id: switch.hall_wall
  mode: restart
