  - action: notify.jacob_notify
    data:
      title: PE kit logged
      message: PE kit confirmed. You're almost organised. Almost.
- id: jacob_pe_not_yet
  alias: Jacob PE kit - not yet
  description: Jacob tapped Not yet - acknowledge and nudge via Alexa
  mode: single
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
