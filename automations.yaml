- id: alarm_panel_heartbeat
  alias: Alarm Panel Heartbeat
  description: Send heartbeat to Mega every minute
  triggers:
  - trigger: time_pattern
    minutes: /1
  actions:
  - action: mqtt.publish
    data:
      topic: alarm/hbeat
      payload: '{{ now().timestamp() | int * 1000 }}'
- id: alarm_panel_state_sync
  alias: Alarm Panel State Sync
  description: Push Alarmo state to Mega whenever it changes
  triggers:
  - trigger: state
    entity_id: alarm_control_panel.alarmo
  actions:
  - action: mqtt.publish
    data:
      topic: alarm/state
      payload: '{{ trigger.to_state.state }}'
- id: alarm_panel_state_on_reconnect
  alias: Alarm Panel State on Reconnect
  description: Re-send current state when Mega reconnects (heartbeat reply received)
  triggers:
  - trigger: mqtt
    topic: alarm/hbeatret
  actions:
  - action: mqtt.publish
    data:
      topic: alarm/state
      payload: '{{ states(''alarm_control_panel.alarmo'') }}'
- id: alarm_panel_pin_handler
  alias: Alarm Panel PIN Handler
  description: Receive PIN from Mega, arm/disarm Alarmo, respond right/wrong
  triggers:
  - trigger: mqtt
    topic: alarm/pin
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: alarm_control_panel.alarmo
        state: disarmed
      sequence:
      - action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.alarmo
        data:
          code: '{{ trigger.payload }}'
    default:
    - action: alarm_control_panel.alarm_disarm
      target:
        entity_id: alarm_control_panel.alarmo
      data:
        code: '{{ trigger.payload }}'
  - wait_for_trigger:
    - trigger: state
      entity_id: alarm_control_panel.alarmo
    timeout:
      seconds: 3
    continue_on_timeout: true
  - choose:
    - conditions: '{{ wait.completed }}'
      sequence:
      - action: mqtt.publish
        data:
          topic: alarm/pinin
          payload: right
    default:
    - action: mqtt.publish
      data:
        topic: alarm/pinin
        payload: wrong
- id: alarm_panel_rfid_success
  alias: Alarm Panel RFID Success
  description: "Known card scanned \u2014 toggle arm/disarm in Alarmo"
  triggers:
  - trigger: mqtt
    topic: alarm/rfid_success
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: alarm_control_panel.alarmo
        state: disarmed
      sequence:
      - action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.alarmo
        data: {}
    default:
    - action: alarm_control_panel.alarm_disarm
      target:
        entity_id: alarm_control_panel.alarmo
      data: {}
- id: alarm_panel_rfid_fail
