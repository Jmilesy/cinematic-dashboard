blueprint:
  homeassistant:
    min_version: 2024.6.0
  name: F1 Track Status Light
  description: "## Lights out and away we go! \U0001F3C1\nThis blueprint gives Formule
    1 Race Control the posibility to control the lights in your house!\n\n<details>
    <summary><b>Parc fermé</b> \U0001F448</summary>\n\nThis blueprint is only usefull
    when setup correctly so please pay attention to the possibilitys as discribed
    below:\nIf you have any questions, issues or ideas please submit it [here](https://github.com/Nicxe/f1_sensor/issues/new/)
    so it can be looked into.\n## Testing\nTo test this blueprint make sure that your
    selected `Race has ended` in `Race phase`\nAfter that you can change the status
    off the `Track state` sensor under [developer tools](https://my.home-assistant.io/redirect/developer_states/).\n##
    Track sensors\nThis section needs to be filled in to communicate between the lights
    and the data provided by the add-on. \n- Session State: The sensors that reports
    the current race session state\n  - Default: `sensor.f1_session_status`\n- Track
    State: The sensors that reports the current track state\n  - Default: `sensor.f1_track_status`\n-
    Race phase: The blueprint will only run in the selected phases\n  - Advised: `Race
    is on-going (live)`, `Race is suspended` and `Race has finished`\n\n## Device
    tracker\nHere are 2 options:\n- Devices gives you the opportunity to monitor if
    the device is at home.\n  - When selecting multiple devices it triggers when at
    least one device is at home\n- Mediaplayer gives you the opportunity to monitor
    the state of a mediaplayer, currently only the domain `media_player` is possible\n
    \ - Current states to check: `on` and `playing`\n\n## Do not disturb\nIf turned
    on the blueprint will canceled if the current system time is between the start
    and end time.\n## Light settings\n- \U0001F4A1 Light to Control: The device that
    needs to be controlled\n- \U0001F506 Brightness Percentage: The brightness off
    the device that is controlled\n- \U0001F4A8 Transition Time: The time between
    state changes\n  - When you choose '0' the light will change immediately, that
    could be a bit annoying.\n\n## Flag colors\nGive each flag it's own RGB color,
    you're lights will transform to this color based on flag status during the race\n-
    \U0001F7E9 Clear ('Green'): No problems on track, free to race\n  - Default: `0`,
    `255`, `0`\n- \U0001F7E8 Yellow: Yellow flag has raised\n  - Default: `255`, `255`,
    `0`\n- \U0001F7E5 Red: Race is suspended\n  - Default: `255`, `0`, `0`\n\n## (Virtual)
    Safety Car\nSpecific settings for when there is a (Virtual) Safety Car on track\n-
    Virtual Safety Car: Color for when there is a virtual safety car\n  - Default:
    `255`, `255`, `0`\n- Safety Car: COlor for when there is a safety car\n  - Default:
    `255`, `0`, `0`\n- Flash for SC and VSC: Does the light needs to flash on a (virtual)
    safety car?\n  - Default `on`\n- Flash Time: The time between pulsing on and off\n
    \ - Default: `1` second\n\n## Custum template\nIn the custom template section
    you can create you're own template options. Please be aware that the result needs
    to be `true` for the blueprint to run. If the return of your template is `false`
    the blueprint wont run. Leave empty if you don't want to use this option.\n</details>\n"
  domain: automation
  author: Toppe
  input:
    sensors_section:
      name: Track sensors
      icon: mdi:go-kart-track
      description: 'Select the correct sensors to determine the current session and
        track status.

        '
      collapsed: true
      input:
        session_status_sensor:
          name: Session State
          description: 'Sensor indicating the current session state.

            '
          default: ''
          selector:
            entity:
              filter:
              - domain:
                - sensor
              multiple: false
              reorder: false
        track_status_sensor:
          name: Track state
          description: 'Sensor indicating the current session state.

            '
          default: ''
          selector:
            entity:
              filter:
              - domain:
                - sensor
              multiple: false
              reorder: false
        session_live_status:
          name: Race phase
          description: 'Select in what phase this blueprint need''s to be executed.

            '
          default:
          - live
          selector:
            select:
              mode: dropdown
              multiple: true
              options:
              - label: Pre-race
                value: pre
              - label: Race is on-going (live)
                value: live
              - label: Race is suspended
                value: suspended
              - label: Race has finished
                value: finished
              - label: Race has finalised
                value: finalised
              - label: Race has ended
                value: ended
              - label: Break
                value: break
              custom_value: false
              sort: false
    device_based:
      name: Device tracker
      icon: mdi:tablet-cellphone
      collapsed: true
      description: 'When activated the blueprint will run when *one* of the selected
        devices has the status ''home''. Leave empty when you don''t want to use this
        option.

        '
      input:
        device_list:
          name: "\U0001F4F1 Devices"
          description: 'The devices that should be checked if there home. Select none
            is you dont want to use this.

            '
          default: ''
          selector:
            entity:
              filter:
              - domain:
                - device_tracker
              multiple: true
              reorder: false
        media_player:
          name: "\U0001F4F1 Mediaplayer"
          description: 'Select the mediaplayer that should be watched.

            '
          default: ''
          selector:
            entity:
              filter:
              - domain:
                - media_player
              multiple: false
              reorder: false
    time_based:
      name: Do not disturb
      icon: mdi:minus-circle-off
      description: 'Adjust time sensitive working of the blueprint, when enabled to
        blueprint will not work between the specified hours.

        '
      collapsed: true
      input:
        do_not_disturb:
          name: "\U0001F507 Do not disturb"
          description: If enabled a do not disturb state will turn on. Between that
            time nothing will hapen regardless the state of the race. Usefull for
            when you are sleeping or having visitors.
          default: enabled
          selector:
            select:
              options:
              - label: Enabled
                value: enabled
              - label: Disabled
                value: disabled
              multiple: false
              custom_value: false
              sort: false
        dnd_start:
          name: ▶️ Start time
          description: Start time to turn on do not disturb
          default: '23:00:00'
          selector:
            time: {}
        dnd_end:
          name: ⏹️ End time
          description: End time to turn off do not disturb
          default: 07:00:00
          selector:
            time: {}
    lights_section:
      name: Light settings
      icon: mdi:traffic-light
      description: 'Select the entity for the lights. When multiple lights need to
        be controlled please create a light [group](https://www.home-assistant.io/integrations/group/)
        instead of seperate entities!

        '
      collapsed: true
      input:
        light_entity:
          name: "\U0001F4A1 Light to Control"
          description: 'The light entity whose color and brightness will be updated

            '
          default: ''
          selector:
            entity:
              filter:
              - domain:
                - light
              multiple: false
              reorder: false
        brightness:
          name: "\U0001F506 Brightness Percentage"
          description: 'Brightness level when turning the light on (0–100%)

            '
          default: 100
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: '%'
              step: 1.0
              mode: slider
        transition_time:
          name: ⏱️ Transition Time
          description: 'Time in seconds for the light to transition to the new settings

            '
          default: 1
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              unit_of_measurement: s
              mode: slider
    flag_color:
      name: Flag colors
      icon: mdi:palette
      description: 'Give each flag it''s own color

        '
      collapsed: true
      input:
        clear_rgb:
          name: "\U0001F7E9 Clear ('Green')"
          description: The color for when the track is clear.
          default:
          - 0
          - 255
          - 0
          selector:
            color_rgb: {}
        yellow_rgb:
          name: "\U0001F7E8 Yellow"
          description: The color for when there is a yellow flag.
          default:
          - 255
          - 255
          - 0
          selector:
            color_rgb: {}
        red_rgb:
          name: "\U0001F7E5 Red"
          description: The color for when there is a red flag.
          default:
          - 255
          - 0
          - 0
          selector:
            color_rgb: {}
    sc:
      name: (Virtual) Safety Car
      icon: mdi:car-emergency
      description: Specific settings for a safety car.
      collapsed: true
      input:
        vsc_rgb:
          name: "\U0001F7E8 Virtual Safety Car"
          description: The color for when there is a virtual safety car
          default:
          - 255
          - 255
          - 0
          selector:
            color_rgb: {}
        sc_rgb:
          name: "\U0001F7E5 Safety Car"
          description: The color for when the safety car is on track
          default:
          - 255
          - 0
          - 0
          selector:
            color_rgb: {}
        flash_on_sc:
          name: "\U0001FAA9 Flash for SC and VSC"
          description: Should the lights be flashing when a SC or VSC is active?
          default: true
          selector:
            boolean: {}
        flash_time:
          name: ⏱️ Flash Time
          description: Time between on-off behavior
          default: 1
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 1.0
              unit_of_measurement: s
              mode: slider
    custom_template_section:
      name: Custom Template
      icon: mdi:code-braces
      description: 'Custom template

        '
      collapsed: true
      input:
        custom_template:
          name: "\U0001F5B9 Custom Template"
          description: 'Write you''re own Jinja2 template, please note that the return
            state should be **true** or **false**. Leave empty if you don''t want
            to use it.

            '
          default: ''
          selector:
            template: {}
  source_url: https://github.com/EvertJob/F1-Blueprint/blob/main/blueprint/f1.yaml
variables:
  devices: !input device_list
  mediaplayer: !input media_player
  light_id: !input light_entity
  flashing: !input flash_on_sc
  dnd_state: !input do_not_disturb
  dnd_start: !input dnd_start
  dnd_end: !input dnd_end
  template_config: !input custom_template
trigger:
- trigger: state
  entity_id: !input track_status_sensor
- trigger: state
  entity_id: !input session_status_sensor
condition:
- condition: state
  entity_id: !input session_status_sensor
  state: !input session_live_status
- condition: template
  value_template: "{% if devices | length > 0 %}\n  {{ expand(devices) | selectattr('state',
    'eq', 'home') | list | count > 0 }}\n{% else %}\n  true\n{% endif %}\n"
- condition: template
  value_template: "{% set custom = states(template_config) %} {% if template_config
    | length > 0 %}\n  {{ template_config }}\n{% else %}\n  true\n{% endif %}\n"
- condition: template
  value_template: "{% if mediaplayer | length > 0 %}\n  {{ expand(mediaplayer) | selectattr('state',
    'in', ['playing', 'on', 'idle']) | list | count > 0 }}\n{% else %}\n  true\n{%
    endif %}\n"
- condition: not
  conditions:
  - condition: template
    value_template: '{{ is_state(dnd_state, ''enabled'') }}

      '
  - condition: template
    value_template: '{% set now = now().hour * 3600 + now().minute * 60 + now().second
      %} {% set start_raw = states(dnd_start) %} {% set end_raw = states(dnd_end)
      %} {% set start = (start_raw.split('':'')[0]|default(0)|int * 3600) + (start_raw.split('':'')[1]|default(0)|int
      * 60) if '':'' in start_raw else 0 %} {% set end = (end_raw.split('':'')[0]|default(0)|int
      * 3600) + (end_raw.split('':'')[1]|default(0)|int * 60) if '':'' in end_raw
      else 0 %} {{ (start <= end and start <= now <= end) or (start > end and (now
      >= start or now <= end)) }}

      '
action:
- choose:
  - conditions:
    - condition: template
      value_template: '{{ trigger.to_state.state == ''CLEAR'' }}'
    sequence:
    - action: light.turn_on
      target:
        entity_id: !input light_entity
      data:
        brightness_pct: !input brightness
        rgb_color: !input clear_rgb
        transition: !input transition_time
  - conditions:
    - condition: template
      value_template: '{{ trigger.to_state.state == ''YELLOW'' }}'
    sequence:
    - action: light.turn_on
      target:
        entity_id: !input light_entity
      data:
        brightness_pct: !input brightness
        rgb_color: !input yellow_rgb
        transition: !input transition_time
  - conditions:
    - condition: template
      value_template: '{{ trigger.to_state.state == ''RED'' }}'
    sequence:
    - action: light.turn_on
      target:
        entity_id: !input light_entity
      data:
        brightness_pct: !input brightness
        rgb_color: !input red_rgb
        transition: !input transition_time
  - conditions:
    - condition: template
      value_template: '{{ trigger.to_state.state == ''SC'' }}'
    sequence:
    - if:
      - condition: template
        value_template: '{{ flashing }}

          '
      then:
        repeat:
          while:
          - condition: state
            entity_id: sensor.f1_track_status
            state: SC
          sequence:
          - action: light.turn_on
            metadata: {}
            data:
              rgb_color: !input sc_rgb
            target:
              entity_id: !input light_entity
          - delay:
              hours: 0
              minutes: 0
              seconds: !input flash_time
              milliseconds: 0
          - action: light.turn_off
            metadata: {}
            data: {}
            target:
              entity_id: !input light_entity
          - delay:
              hours: 0
              minutes: 0
              seconds: !input flash_time
              milliseconds: 0
      else:
      - action: light.turn_on
        target:
          entity_id: !input light_entity
        data:
          brightness_pct: !input brightness
          rgb_color: !input sc_rgb
          transition: !input transition_time
  - conditions:
    - condition: template
      value_template: '{{ trigger.to_state.state == ''VSC'' }}'
    sequence:
    - if:
      - condition: template
        value_template: '{{ flashing }}

          '
      then:
        repeat:
          while:
          - condition: state
            entity_id: sensor.f1_track_status
            state: VSC
          sequence:
          - action: light.turn_on
            metadata: {}
            data:
              rgb_color: !input vsc_rgb
            target:
              entity_id: !input light_entity
          - delay:
              hours: 0
              minutes: 0
              seconds: !input flash_time
              milliseconds: 0
          - action: light.turn_off
            metadata: {}
            data: {}
            target:
              entity_id: !input light_entity
          - delay:
              hours: 0
              minutes: 0
              seconds: !input flash_time
              milliseconds: 0
      else:
      - action: light.turn_on
        target:
          entity_id: !input light_entity
        data:
          brightness_pct: !input brightness
          rgb_color: !input sc_rgb
          transition: !input transition_time
mode: restart
