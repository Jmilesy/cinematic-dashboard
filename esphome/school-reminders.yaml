esphome:
  name: school-reminders
  comment: school-reminders
  area: school-reminders

esp32:
  board: esp32dev
  framework:
    type: esp-idf  

esp32_ble_tracker:

bluetooth_proxy:
  active: true
  connection_slots: 3

logger:
  

# Enable Home Assistant API
api:
  encryption:
    key: !secret school_reminders__encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: School-Reminders
    password: !secret fallback_password
captive_portal:




text_sensor:
  - platform: homeassistant
    id: school
    name: school
    entity_id: input_text.boys_school
    internal: true
    on_value:
     then:
      - logger.log: "Hello World"

    # Formatted:
      - logger.log:
          format: "The school reminders show as %s "
          args: [ 'id(school).state.c_str()' ]

  - platform: homeassistant
    id: rotary_ui_state
    entity_id: input_select.rotary_ui_state
    internal: true

  - platform: homeassistant
    id: rotary_day
    entity_id: input_select.rotary_day
    internal: true
    on_value:
      then:
        - lambda: |-
            if (x == "Tomorrow") {
              id(today).turn_off();
              id(tomorrow).turn_on();
            } else {
              id(today).turn_on();
              id(tomorrow).turn_off();
            }

  - platform: homeassistant
    id: school_tomorrow
    entity_id: sensor.school_event_tomorrow
    internal: true

  - platform: homeassistant
    id: jacob_today
    entity_id: input_text.jacob_timetable_today
    internal: true

  - platform: homeassistant
    id: jacob_tomorrow
    entity_id: input_text.jacob_timetable_tomorrow
    internal: true

  - platform: homeassistant
    id: bedtime_status
    entity_id: input_boolean.boys_bedtime_switch
    internal: true

  - platform: homeassistant
    id: alert_status
    entity_id: input_boolean.alert_active
    internal: true

  - platform: homeassistant
    id: alarm_status
    entity_id: alarm_control_panel.alarmo
    internal: true


time:
  - platform: homeassistant
    id: ha_time


i2c:
  sda: 21
  scl: 22

display:
  - platform: lcd_pcf8574
    dimensions: 20x4
    address: 0x27
    lambda: |-
      auto print_line = [&](int row, std::string text) {
        if (text.length() > 20) {
          text = text.substr(0, 20);
        }
        it.printf(0, row, "%-20s", text.c_str());
      };

      auto state_label = [](std::string state) -> std::string {
        if (state == "on") {
          return "ON";
        }
        if (state == "off") {
          return "OFF";
        }
        if (state.empty()) {
          return "unknown";
        }
        return state;
      };

      auto upper_day = [&]() -> std::string {
        return id(rotary_day).state == "Tomorrow" ? "TOMORROW" : "TODAY";
      };

      auto print_split_lines = [&](int first_row, std::string text, int offset) {
        if (text.empty() || text == "unknown" || text == "unavailable") {
          text = "Nothing planned";
        }

        std::vector<std::string> lines;
        size_t start = 0;
        while (start < text.length()) {
          size_t end = text.find(',', start);
          std::string line = text.substr(start, end == std::string::npos ? std::string::npos : end - start);
          while (!line.empty() && line.front() == ' ') {
            line.erase(0, 1);
          }
          if (!line.empty()) {
            lines.push_back(line);
          }
          if (end == std::string::npos) {
            break;
          }
          start = end + 1;
        }

        if (lines.empty()) {
          lines.push_back("Nothing planned");
        }

        int row = first_row;
        int index = offset;
        if (index < 0 || index >= (int) lines.size()) {
          index = 0;
        }
        while (row < 4 && index < (int) lines.size()) {
          print_line(row, lines[index]);
          row++;
          index++;
        }
        while (row < 4) {
          print_line(row, "");
          row++;
        }
      };

      auto print_school_lines = [&](int first_row) {
        std::string text = id(rotary_day).state == "Tomorrow" ? id(school_tomorrow).state : id(school).state;
        print_split_lines(first_row, text, (int) id(rotary_menu_index).state);
      };

      auto print_jacob_lines = [&](int first_row) {
        std::string text = id(rotary_day).state == "Tomorrow" ? id(jacob_tomorrow).state : id(jacob_today).state;
        print_split_lines(first_row, text, (int) id(rotary_menu_index).state);
      };

      std::string ui_state = id(rotary_ui_state).state;

      if (ui_state == "menu") {
        int selected = (int) id(rotary_menu_index).state;
        if (selected < 0 || selected > 4) {
          selected = 0;
        }
        print_line(0, "MENU");
        print_line(1, std::string(selected == 0 ? ">" : " ") + "School " + std::string(selected == 1 ? ">" : " ") + "Jacob");
        print_line(2, std::string(selected == 2 ? ">" : " ") + "Bedtime " + std::string(selected == 3 ? ">" : " ") + "Alerts");
        print_line(3, std::string(selected == 4 ? ">" : " ") + "Alarm");
        return;
      }

      if (ui_state == "page_school") {
        print_line(0, "SCHOOL: " + upper_day());
        print_school_lines(1);
        return;
      }

      if (ui_state == "page_jacob") {
        print_line(0, "JACOB: " + upper_day());
        print_jacob_lines(1);
        return;
      }

      if (ui_state == "page_bedtime") {
        print_line(0, "BEDTIME");
        print_line(1, "Status: " + state_label(id(bedtime_status).state));
        print_line(2, "Press = Toggle");
        print_line(3, "Long = Front");
        return;
      }

      if (ui_state == "page_alerts") {
        print_line(0, "ALERTS");
        print_line(1, "Status: " + state_label(id(alert_status).state));
        print_line(2, "Press = Clear");
        print_line(3, "Long = Front");
        return;
      }

      if (ui_state == "page_alarm") {
        print_line(0, "ALARM");
        print_line(1, "Status:");
        print_line(2, state_label(id(alarm_status).state));
        print_line(3, "Read only");
        return;
      }

      auto now = id(ha_time).now();
      if (now.is_valid()) {
        char date_line[21];
        now.strftime(date_line, sizeof(date_line), "%a %d/%m %H:%M");
        print_line(0, date_line);
      } else {
        print_line(0, "FRONT");
      }

      print_split_lines(1, id(school).state, 0);

