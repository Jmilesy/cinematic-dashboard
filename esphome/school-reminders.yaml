  - platform: gpio
    pin: GPIO14
    name: "Jacob_out"
    id: Jacob_out
 
  - platform: gpio
    pin: GPIO16
    name: "Joseph_out"
    id: Joseph_out

  - platform: gpio
    pin: GPIO17
    name: "Jacob_club"
    id: Jacob_club
    
  - platform: gpio
    pin: GPIO18
    name: "Joseph_club"
    id: Joseph_club
    
  - platform: gpio
    pin: GPIO5
    name: "Jacob_project"
    id: Jacob_project
    
  - platform: gpio
    pin: GPIO23
    name: "Joseph_project"
    id: Joseph_project
    
  - platform: gpio
    pin: GPIO19
    name: "Jacob_trip"
    id: Jacob_trip
    
  - platform: gpio
    pin: GPIO26
    name: "today"
    id: today
    restore_mode: ALWAYS_ON
    
  - platform: gpio
    pin: GPIO25
    name: "tomorrow"
    id: tomorrow
    restore_mode: ALWAYS_OFF
    
binary_sensor:
  - platform: gpio
    id: switch_day
    name: "Switch_day"
    filters:
    - delayed_on: 50ms
    - delayed_off: 50ms
    pin:
      number: GPIO33
      inverted: True
      mode:
        pullup: true
        input: true
    on_click:
      - min_length: 50ms
        max_length: 600ms
        then:
          - homeassistant.event:
              event: esphome.encoder_event
              data:
                action: press
      - min_length: 600ms
        max_length: 5s
        then:
          - homeassistant.event:
              event: esphome.encoder_event
              data:
                action: long_press
  # Bluetooth presence detection
  - platform: ble_presence
    ibeacon_uuid: "c11b71d5-3772-4b30-8f24-684f33dadd3f"
    name: "Jacob BT Present"
    device_class: presence

  - platform: ble_presence
    ibeacon_uuid: "a5acc421-706a-4331-9889-3c408ec046dd"
    name: "Joseph BT Present"
    device_class: presence

  - platform: ble_presence
    ibeacon_uuid: "78aff0ac-333f-4288-9196-ec1521190fbc"
    name: "Jon BT Present"
    device_class: presence

  - platform: ble_presence
    ibeacon_uuid: "7aaa77c3-4a49-491c-8d0f-90e1ebfff9c9"
    name: "Natalie BT Present"
    device_class: presence

sensor:
  - platform: homeassistant
    id: rotary_menu_index
    entity_id: input_number.rotary_menu_index
    internal: true

  - platform: rotary_encoder
    id: rotary
    pin_a: GPIO34
    pin_b: GPIO35
    resolution: 1
    filters:
      - debounce: 5ms
    internal: true
    on_clockwise:
      - homeassistant.event:
          event: esphome.encoder_event
          data:
            action: right
    on_anticlockwise:
      - homeassistant.event:
          event: esphome.encoder_event
          data:
            action: left
