esphome:
  name: bedroom_relay
  platform: ESP8266
  board: esp01

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Bedroom Relay Fallback Hotspot"
    password: "BjOuPiPIgqTA"

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  - platform: esphome
    password: !secret api_password

switch:
  - platform: gpio
    name: "Bedroom Christmas"
    pin: 2
