esphome:
  name: alarm-panel-brain
  friendly_name: Alarm Panel Brain
  comment: Alarm Panel V2 — brain board (RFID, LEDs, buzzer, relays, encoder, mic)

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "alarm-panel-brain"
    password: !secret fallback_password

captive_portal:

# I2C — PCF8574 I/O expander @ 0x20
# Up / Down / Encoder-SW / Buzzer / Strobe relay
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

pcf8574:
  - id: pcf8574_hub
    address: 0x20

# I2S — dedicated INMP441 microphone
# WS/LRCLK=GPIO32  SCK/BCLK=GPIO14  SD/DIN=GPIO35  L/R=GND (left channel)
i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO32
  i2s_bclk_pin: GPIO14

microphone:
  - platform: i2s_audio
    id: alarm_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO35
    adc_type: external
    pdm: false
    channel: left
    bits_per_sample: 32bit
    sample_rate: 16000

# Voice assistant — capture only for now.
# No wake word / trigger mechanism decided yet — start() needs
# to be called from somewhere (button, HA service, or a wake
# word engine) before this does anything. Left un-triggered
# intentionally until that's decided.
voice_assistant:
  id: alarm_va
  microphone: alarm_mic
  use_wake_word: false

# SPI — RFID reader (RC522)
spi:
  mosi_pin: GPIO23
  miso_pin: GPIO19
  clk_pin: GPIO18

rc522_spi:
  id: rfid_reader
  cs_pin: GPIO5
  reset_pin: GPIO4
  on_tag:
    - then:
        - logger.log:
            format: "RFID tag scanned: %s"
            args: ["x.c_str()"]
        # Arm/disarm/tag-matching logic not yet designed — placeholder only

# RGB status LED — three separate LEDs (not one WS2812)
output:
  - platform: ledc
    id: red_led_output
    pin: GPIO27
  - platform: ledc
    id: green_led_output
    pin: GPIO26
  - platform: ledc
    id: blue_led_output
    pin: GPIO25

light:
  - platform: rgb
    name: "Alarm Panel Status LED"
    red: red_led_output
    green: green_led_output
    blue: blue_led_output

# Buzzer — moved to PCF8574 P3 (beep only, no PWM tone needed)
switch:
  - platform: gpio
    name: "Alarm Panel Buzzer"
    pin:
      pcf8574: pcf8574_hub
      number: 3
    id: buzzer

  # Siren relay — stays on native GPIO
  - platform: gpio
    name: "Alarm Panel Siren Relay"
    pin: GPIO33
    id: siren_relay

  # Strobe relay — moved to PCF8574 P4
  - platform: gpio
    name: "Alarm Panel Strobe Relay"
    pin:
      pcf8574: pcf8574_hub
      number: 4
    id: strobe_relay

  # Makeup light relay — native GPIO, dumb LED strip
  - platform: gpio
    name: "Makeup Light Relay"
    pin: GPIO13
    id: makeup_light_relay

# Rotary encoder — Up/Down buttons on PCF8574 P0/P1,
# encoder push-button (SW) on PCF8574 P2
sensor:
  - platform: rotary_encoder
    name: "Alarm Panel Encoder"
    id: alarm_encoder
    pin_a:
      number: GPIO2
    pin_b:
      number: GPIO15

binary_sensor:
  - platform: gpio
    name: "Alarm Panel Up Button"
    pin:
      pcf8574: pcf8574_hub
      number: 0
      inverted: true

  - platform: gpio
    name: "Alarm Panel Down Button"
    pin:
      pcf8574: pcf8574_hub
      number: 1
      inverted: true

  - platform: gpio
    name: "Alarm Panel Encoder Button"
    pin:
      pcf8574: pcf8574_hub
      number: 2
      inverted: true

  # Tamper switch — input-only pin, needs an external pull resistor
  # (not provided internally on GPIO34/35/36/39)
  - platform: gpio
    name: "Alarm Panel Tamper Switch"
    pin:
      number: GPIO34
      mode:
        input: true
