esphome:
  name: alarm-panel-brain
  friendly_name: Alarm Panel Brain
  comment: Alarm Panel V2 — brain board (RFID, LEDs, buzzer, relays, encoder, mic)
  # Nothing in this config previously called micro_wake_word.start, so the
  # wake-word engine sat in IDLE forever and never touched the microphone -
  # confirmed via zero state-transition logs and zero on_data callbacks over
  # hours of uptime, even after swapping the physical mic. Matches the
  # pattern in every working ESPHome micro_wake_word example found.
  on_boot:
    priority: 600
    then:
      - logger.log: "on_boot: waiting 10s before starting wake word engine"
      - delay: 10s
      - logger.log: "on_boot: calling micro_wake_word.start now"
      - micro_wake_word.start:
      - logger.log: "on_boot: micro_wake_word.start call completed"

# The on_boot start above isn't reliable every boot (confirmed 17 Jul: some
# boots never log a single micro_wake_word state transition even after
# waiting minutes). Calling micro_wake_word.start when it's already running
# is safe - it just logs a harmless "already running" warning - so this
# repeating interval acts as a self-healing safety net rather than relying
# on a single fragile boot-time attempt.
interval:
  - interval: 30s
    then:
      - micro_wake_word.start:

esp32:
  board: esp32dev
  framework:
    type: arduino

globals:
  - id: mic_level_last_log
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: mic_level_peak
    type: int32_t
    restore_value: false
    initial_value: '0'

logger:
  level: VERY_VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "alarm-panel-brain"
    password: !secret fallback_password

captive_portal:

# I2C — PCF8574 I/O expander @ 0x20
# Up / Down / Encoder-SW / Buzzer / Strobe relay
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

pcf8574:
  - id: pcf8574_hub
    address: 0x20

# UART link to the screen board — carries TTS reply URLs from
# on_tts_end so the screen board can play them through its speaker.
# Wiring: brain TX17 -> screen RX44, brain RX16 -> screen TX43
uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

# I2S — dedicated INMP441 microphone
# WS/LRCLK=GPIO32  SCK/BCLK=GPIO14  SD/DIN=GPIO35  L/R=GND (left channel)
i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO32
  i2s_bclk_pin: GPIO14

microphone:
  - platform: i2s_audio
    id: alarm_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO35
    adc_type: external
    pdm: false
    channel: left
    bits_per_sample: 32bit
    sample_rate: 16000
    on_data:
      then:
        - lambda: |-
            const int32_t *samples = reinterpret_cast<const int32_t*>(x.data());
            size_t count = x.size() / sizeof(int32_t);
            int32_t peak = 0;
            for (size_t i = 0; i < count; i++) {
              int32_t v = samples[i];
              if (v < 0) v = -v;
              if (v > peak) peak = v;
            }
            if (peak > id(mic_level_peak)) id(mic_level_peak) = peak;
            uint32_t now = millis();
            if (now - id(mic_level_last_log) > 1000) {
              id(mic_level_last_log) = now;
              ESP_LOGI("mic_level", "Mic peak amplitude (last ~1s, %d samples): %d", (int)count, (int)id(mic_level_peak));
              id(mic_level_peak) = 0;
            }

# Voice assistant — bench test with a wake word (14 Jul 2026).
# Using the stock "hey_jarvis" model just to prove the pipeline
# works end-to-end on real hardware — NOT the final wake word.
# Final wake word choice (a custom "Computer" style word for the
# TNG persona) is a separate, later decision.
micro_wake_word:
  id: mww
  models:
    - model: hey_jarvis
      probability_cutoff: 0.6
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda 'return wake_word;'

voice_assistant:
  id: alarm_va
  microphone: alarm_mic
  micro_wake_word: mww
  use_wake_word: true
  on_listening:
    - logger.log: "Wake word detected — listening..."
  on_stt_end:
    then:
      - logger.log:
          format: "Heard: %s"
          args: ["x.c_str()"]
  on_tts_end:
    then:
      - uart.write:
          id: uart_bus
          data: !lambda |-
            std::string msg = x + "\n";
            return std::vector<uint8_t>(msg.begin(), msg.end());
  on_end:
    - logger.log: "Voice assistant session ended"

# SPI — RFID reader (RC522) — commented out, nothing physically
# connected to these pins yet. Uncomment once the RC522 is wired up.
# spi:
#   mosi_pin: GPIO23
#   miso_pin: GPIO19
#   clk_pin: GPIO18
#
# rc522_spi:
#   id: rfid_reader
#   cs_pin: GPIO5
#   reset_pin: GPIO4
#   on_tag:
#     - then:
#         - logger.log:
#             format: "RFID tag scanned: %s"
#             args: ["x.c_str()"]
#         # Arm/disarm/tag-matching logic not yet designed — placeholder only

# RGB status LED — three separate LEDs (not one WS2812)
output:
  - platform: ledc
    id: red_led_output
    pin: GPIO27
  - platform: ledc
    id: green_led_output
    pin: GPIO26
  - platform: ledc
    id: blue_led_output
    pin: GPIO25

light:
  - platform: rgb
    name: "Alarm Panel Status LED"
    red: red_led_output
    green: green_led_output
    blue: blue_led_output

# Buzzer — moved to PCF8574 P3 (beep only, no PWM tone needed)
switch:
  - platform: gpio
    name: "Alarm Panel Buzzer"
    pin:
      pcf8574: pcf8574_hub
      number: 3
    id: buzzer

  # Siren relay — stays on native GPIO
  - platform: gpio
    name: "Alarm Panel Siren Relay"
    pin: GPIO33
    id: siren_relay

  # Strobe relay — moved to PCF8574 P4
  - platform: gpio
    name: "Alarm Panel Strobe Relay"
    pin:
      pcf8574: pcf8574_hub
      number: 4
    id: strobe_relay

  # Makeup light relay — native GPIO, dumb LED strip
  - platform: gpio
    name: "Makeup Light Relay"
    pin: GPIO13
    id: makeup_light_relay

# Rotary encoder — Up/Down buttons on PCF8574 P0/P1,
# encoder push-button (SW) on PCF8574 P2
sensor:
  - platform: rotary_encoder
    name: "Alarm Panel Encoder"
    id: alarm_encoder
    pin_a:
      number: GPIO2
    pin_b:
      number: GPIO15

binary_sensor:
  - platform: gpio
    name: "Alarm Panel Up Button"
    pin:
      pcf8574: pcf8574_hub
      number: 0
      inverted: true

  - platform: gpio
    name: "Alarm Panel Down Button"
    pin:
      pcf8574: pcf8574_hub
      number: 1
      inverted: true

  - platform: gpio
    name: "Alarm Panel Encoder Button"
    pin:
      pcf8574: pcf8574_hub
      number: 2
      inverted: true

  # Tamper switch — input-only pin, needs an external pull resistor
  # (not provided internally on GPIO34/35/36/39)
  - platform: gpio
    name: "Alarm Panel Tamper Switch"
    pin:
      number: GPIO34
      mode:
        input: true
