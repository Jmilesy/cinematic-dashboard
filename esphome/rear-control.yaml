---
substitutions:
  device_name: rear-control
  friendly_name: backroom
  device_description: "esp8266 by controlling dining room devices"

esphome:
  name: '${device_name}'
  friendly_name: '${device_name}'
  comment: '${device_description}'
  project:
    name: "jon.backroom"
    version: "0.0.1"

esp8266:
  board: d1_mini_lite

logger:
  level: WARN

api:

ota:
  - platform: esphome
    password: !secret api_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Rear-Control Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

binary_sensor:
  - platform: gpio
    pin:
      number: D7
      mode: INPUT_PULLUP
    name: "Kitchen Window"
    device_class: Window
  - platform: gpio
    pin:
      number: D6
      mode: INPUT_PULLUP
    name: "Backdoor"
    device_class: door
    filters:
      - delayed_on: 1s
      - delayed_off: 1s
  - platform: gpio
    pin:
      number: D5
      mode: INPUT_PULLUP
    name: "Dining Room Window"
    device_class: Window
