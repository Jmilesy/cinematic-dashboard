esphome:
    name: dining_room
    comment: dining room monitor
    area: Dining Room

esp8266:
    board: d1_mini
    
 
substitutions:
  device_name: Dining_Room_monitor
  friendly_name: Dining_Rm

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password



  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Dining Room Fallback Hotspot"
    password: "3OtxUxpkuzy9"

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    password: !secret api_password

text_sensor:
  - platform: version
    hide_timestamp: true
    name: '${friendly_name} - ESPHome Version'
  - platform: wifi_info
    ip_address:
      name: '${friendly_name} - IP Address'
      icon: mdi:wifi
    ssid:
      name: '${friendly_name} - Connected SSID'
      icon: mdi:wifi-strength-2

binary_sensor:
  - platform: gpio
    pin: GPIO16
    name: "Dining Room PIR Sensor"
    device_class: motion
    
one_wire:
  - platform: gpio
    pin: 02
  
switch:
  - platform: gpio
    name: "Rack Fan Relay"
    pin: 
      number: GPIO14
      inverted: true

  

sensor:
  # WiFi signal
  - platform: wifi_signal
    name: "${friendly_name} - WiFi Signal"
    update_interval: 120s
  - platform: dallas_temp
    address: 0x6C03172135DDFF28
    name: "Rack Temp"
  - platform: dht
    pin: D3
    model: DHT11
    temperature:
      name: "Dining Room Temperature"
    humidity:
      name: "Dining Room Humidity"
    update_interval: 60s

  - platform: adc
    pin: A0
    name: "Diningroom temp"
    unit_of_measurement: "°C"
    filters:
      - lambda: |-
          return ((((x/512)*5))*10000); 