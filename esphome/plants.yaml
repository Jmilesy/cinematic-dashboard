esphome:
  name: plants

esp8266:
  board: nodemcuv2
  
substitutions:
  device_name: Plants
  friendly_name: Plants
  update_interval: 600s

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  
text_sensor:
  - platform: version
    hide_timestamp: true
    name: '${friendly_name} - ESPHome Version'
  - platform: wifi_info
    ip_address:
      name: '${friendly_name} - IP Address'
      icon: mdi:wifi
    ssid:
      name: '${friendly_name} - Connected SSID'
      icon: mdi:wifi-strength-2

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Plants Fallback Hotspot"
    password: "6kNAshsOomoy"

captive_portal:

i2c:
  sda: 04
  scl: 05
  scan: true
  id: bus_a
  
ads1115:
  - address: 0x48
  
sensor:
  # WiFi signal
  - platform: wifi_signal
    name: "${friendly_name} - WiFi Signal"
    update_interval: 120s
    
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 6.144
    filters:
      - calibrate_linear:
          - 4 -> 100.00
          - 2 -> 0.00
    name: "Soil Moisture Level 1"
    update_interval: ${update_interval}
    unit_of_measurement: '%'
    accuracy_decimals: 0
    
  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 6.144
    filters:
      - calibrate_linear:
          - 4 -> 100.00
          - 2 -> 0.00
    name: "Soil Moisture Level 2"
    update_interval: ${update_interval}
    unit_of_measurement: '%'
    accuracy_decimals: 0
    
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 6.144
    name: "Soil Moisture Level 1 raw"
    update_interval: ${update_interval}
    
  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 6.144
    name: "Soil Moisture Level 2 raw"
    update_interval: ${update_interval}
