esphome:
  name: bedroom

  
esp8266:
  board: d1_mini_lite

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Bedroom Fallback Hotspot"
    password: "zCYbIe2Bg5ke"

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    password: !secret api_password

one_wire:
  - platform: gpio
    pin: 16
  
#  0x1403172101D5FF28

switch:
  - platform: gpio
    pin: GPIO2
    name: "Bedroom Buzzer"
    inverted: yes

light:
  - platform: neopixelbus
    variant: WS2812X
    pin: GPIO0
    num_leds: 3
    type: GRB
    name: "FastLED WS2812B Light"
    effects:
    - addressable_flicker:
    - addressable_flicker:
        name: Flicker Effect With Custom Values
        update_interval: 16ms
        intensity: 5%
    - addressable_twinkle:
    - addressable_twinkle:
        name: Twinkle Effect With Custom Values
        twinkle_probability: 5%
        progress_interval: 4ms
    - random:
    - random:
        name: Random Effect With Custom Values
        transition_length: 5s
        update_interval: 7s
    - addressable_scan:
    - addressable_scan:
        name: Scan Effect With Custom Values
        move_interval: 100ms
        scan_width: 1
    - strobe:
    - strobe:
         name: Strobe Effect With Custom Values
         colors:
           - state: True
             brightness: 100%
             red: 100%
             green: 0%
             blue: 0%
             duration: 500ms
           - state: False
             duration: 25ms
           - state: True
             brightness: 100%
             red: 0%
             green: 0%
             blue: 100%
             duration: 500ms
    - addressable_rainbow:
    - addressable_rainbow:
        name: Rainbow Effect With Custom Values
        speed: 10
        width: 50
    - addressable_fireworks:
    - addressable_fireworks:
        name: Fireworks Effect With Custom Values
        update_interval: 32ms
        spark_probability: 10%
        use_random_color: false
        fade_out_rate: 120

binary_sensor:
  - platform: gpio
    pin: 
      number: D2
      mode: INPUT_PULLUP
    name: "Front Door"
    
    device_class: Door
  - platform: gpio
    pin: D7
    name: "Bedroom bright"
    device_class: light
    filters:
      - delayed_on: 10ms

sensor:
  - platform: dht
    pin: D1
    model: DHT11
    temperature:
      name: "Bed Room Temperature dht11"
    humidity:
      name: "BedRoom Humidity"
    update_interval: 60s
  - platform: dallas_temp
    address: 0x1403172101D5FF28
    name: "Bedroom Temperature"
  - platform: adc
    pin: A0
    name: "Bedroom Brightness"
    unit_of_measurement: lux
    update_interval: 5s
    filters:
      - lambda: |-
          return (x / 10000.0) * 2000000.0;